<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TaeguTec SPL</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
    --acc:#38bdf8; --acc2:#0ea5e9;
    --grad:linear-gradient(135deg,#1e3c72,#2a5298);
    --danger:#ef4444; --safe:#22c55e;
    --rx:0deg;--ry:0deg;--rz:0deg;--tx:0px;--ty:0px;--zoom:0.95;--cube-h:50px;
}
:root[data-theme="light"]{
    --bg:#f0f4f8; --panel:#fff; --text:#0f172a; --muted:#64748b;
    --border:#e2e8f0; --shadow:rgba(148,163,184,0.18);
    --map-bg:#fff; --table-border:#e2e8f0;
    --cube-text-color:#0f172a; --map-border-color:#e2e8f0;
    --bg-color:#f0f4f8; --panel-bg:#fff; --text-main:#0f172a;
    --text-muted:#64748b; --border-line:#e2e8f0; --shadow-tone:rgba(148,163,184,0.18);
}
:root[data-theme="dark"]{
    --bg:#0b0f19; --panel:#141b2d; --text:#f8fafc; --muted:#94a3b8;
    --border:#1f293d; --shadow:rgba(0,0,0,0.6);
    --map-bg:#0c101b; --table-border:#334155;
    --cube-text-color:#fff; --map-border-color:#1f293d;
    --bg-color:#0b0f19; --panel-bg:#141b2d; --text-main:#f8fafc;
    --text-muted:#94a3b8; --border-line:#1f293d; --shadow-tone:rgba(0,0,0,0.6);
    --accent-glow:#38bdf8;
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;
    background:var(--bg);color:var(--text);
    font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    user-select:none;}

/* ═══ 앱 레이아웃 ═══ */
#app{display:flex;flex-direction:column;height:100dvh;width:100vw;overflow:hidden;}

/* ═══ 상단 바 ═══ */
#topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top));
    background:var(--panel);border-bottom:1px solid var(--border);
    flex-shrink:0;min-height:52px;
}
#topbar .logo{font-size:16px;font-weight:900;color:var(--acc);letter-spacing:-0.5px;white-space:nowrap;}
#search-box{
    flex:1;position:relative;min-width:0;
}
#global-search{
    width:100%;padding:8px 36px 8px 14px;
    border:1.5px solid var(--border);border-radius:20px;
    background:var(--bg);color:var(--text);font-size:13px;outline:none;
    transition:border-color 0.2s;
}
#global-search:focus{border-color:var(--acc);}
.search-icon-inner{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#search-dropdown{
    display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:var(--panel);border:1px solid var(--border);
    border-radius:12px;box-shadow:0 8px 24px var(--shadow);
    max-height:55vh;overflow-y:auto;z-index:999;
}
#search-dropdown.show{display:block;}
.search-result-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:active{background:rgba(56,189,248,0.08);}
.sri-machine{font-size:12px;font-weight:700;color:var(--acc);}
.sri-part{font-size:11px;color:var(--text);margin-top:2px;}
.sri-sheet{font-size:10px;color:var(--muted);margin-top:1px;}
.search-result-empty{padding:16px;text-align:center;color:var(--muted);font-size:12px;}
.topbar-btns{display:flex;gap:6px;flex-shrink:0;}
.tb-btn{
    width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);
    background:var(--panel);color:var(--text);font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:all 0.15s;
}
.tb-btn:active{transform:scale(0.9);}

/* ═══ 하단 탭바 ═══ */
#tabbar{
    display:flex;border-top:1px solid var(--border);
    background:var(--panel);flex-shrink:0;
    padding-bottom:env(safe-area-inset-bottom);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 4px;cursor:pointer;font-size:10px;color:var(--muted);gap:3px;
    transition:color 0.15s;border:none;background:none;}
.tab.active{color:var(--acc);}
.tab-icon{font-size:20px;line-height:1;}
.tab-label{font-weight:600;}

/* ═══ 페이지 영역 ═══ */
#pages{flex:1;overflow:hidden;position:relative;}
.page{display:none;position:absolute;inset:0;overflow:hidden;}
.page.active{display:flex;flex-direction:column;}

/* ═══ 홈 페이지 ═══ */
#page-home{background:var(--bg);}
.home-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px 6px;flex-shrink:0;
}
.home-header h2{margin:0;font-size:14px;font-weight:800;color:var(--acc);}
.home-actions{display:flex;gap:8px;align-items:center;}
.last-update-sm{font-size:10px;color:var(--muted);}
.shortage-all-btn{
    padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;
    border:1.5px solid #fca5a5;background:#fef2f2;color:#b91c1c;cursor:pointer;
}
/* SVG 공장 배치도 - 가로로 꽉 채우기 */
#factory-wrap{
    flex:1;overflow:hidden;padding:8px;
    display:flex;align-items:center;justify-content:center;
}
#factory-svg{width:100%;height:100%;max-height:100%;}

/* SVG 스타일 원본 유지 */
.zone-dept{fill:#daeaf7;stroke:#a8c8e8;stroke-width:1;cursor:pointer;transition:fill 0.15s;}
.zone-dept:hover,.zone-dept:active{fill:#b8d9f0;}
[data-theme="dark"] .zone-dept{fill:rgba(56,189,248,0.15);stroke:#38bdf8;}
[data-theme="dark"] .zone-dept:hover{fill:rgba(56,189,248,0.28);}
.zone-grass{fill:#d4edda;stroke:#a8d5b5;stroke-width:1;pointer-events:none;}
[data-theme="dark"] .zone-grass{fill:rgba(52,211,153,0.10);stroke:#34d399;}
.zone-roll{fill:#daeaf7;stroke:#a8c8e8;stroke-width:1;cursor:pointer;transition:fill 0.15s;}
.zone-roll:hover{fill:#b8d9f0;}
[data-theme="dark"] .zone-roll{fill:rgba(56,189,248,0.15);stroke:#38bdf8;}
.zone-alert{fill:#fde8e8;stroke:#f5c6cb;stroke-width:1;cursor:pointer;transition:fill 0.15s;}
.zone-alert:hover{fill:#f8c0c0;}
.zlabel{font-family:"Malgun Gothic","Segoe UI",sans-serif;font-size:14px;font-weight:700;
    text-anchor:middle;dominant-baseline:middle;fill:#1e3a5f;pointer-events:none;}
.zlabel-sm{font-size:12px;}
[data-theme="dark"] .zlabel{fill:#e2f0ff;}
.zlabel-alert{fill:#7f1d1d;}
.factory-bg-rect{fill:#e8edf2;}
[data-theme="dark"] .factory-bg-rect{fill:#1e2535;}
.svg-badge-circle{fill:#ef4444;}
.svg-badge-text{fill:white;font-size:9px;font-weight:900;text-anchor:middle;dominant-baseline:central;font-family:"Segoe UI",sans-serif;pointer-events:none;}

/* ═══ 부서 페이지 ═══ */
#page-dept{background:var(--bg);}
.dept-header-bar{
    display:flex;align-items:center;gap:10px;
    padding:8px 12px;background:var(--panel);
    border-bottom:1px solid var(--border);flex-shrink:0;
}
.dept-back-btn{
    width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);
    background:var(--bg);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dept-title{font-size:14px;font-weight:800;color:var(--acc);flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dept-shortage-btn{
    padding:5px 10px;border-radius:14px;font-size:11px;font-weight:700;
    border:1.5px solid #fca5a5;background:#fef2f2;color:#b91c1c;
    cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.dept-shortage-btn.ok{border-color:#86efac;background:#f0fdf4;color:#15803d;}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4);}50%{box-shadow:0 0 0 5px rgba(239,68,68,0);}}
.dept-shortage-btn.has-shortage{animation:pulse-red 1.5s ease-in-out infinite;}
#dynamic-factory-map{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:6px;}
/* 배치도 테이블 셀 작게 */
#dynamic-factory-map table{width:100%;border-collapse:separate;border-spacing:3px;table-layout:fixed;}
#dynamic-factory-map td{font-size:10px!important;padding:6px 3px!important;border-radius:7px!important;}

/* ═══ 스페어파트 전체화면 (가로 모드 유도) ═══ */
#view-parts{
    display:none;position:fixed;inset:0;z-index:500;
    background:var(--bg);flex-direction:column;
}
#view-parts.open{display:flex;}
#view-parts *{user-select:text!important;}
.parts-topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));
    background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;
}
.parts-back-btn{
    width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);
    background:var(--bg);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#lbl-parts-title{font-size:13px;font-weight:800;color:var(--acc);flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parts-search-bar{
    padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;
}
#parts-search{
    width:100%;padding:8px 14px;border:1.5px solid var(--border);border-radius:18px;
    background:var(--bg);color:var(--text);font-size:13px;outline:none;
}
#parts-search:focus{border-color:var(--acc);}
.parts-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
/* 파트 테이블 */
.part-table{width:100%;border-collapse:collapse;font-size:12px;}
.part-table thead th{
    position:sticky;top:0;background:var(--panel);
    padding:9px 8px;text-align:center;font-weight:700;
    border-bottom:2px solid var(--border);cursor:pointer;
    white-space:nowrap;color:var(--acc);font-size:11px;z-index:10;
}
.part-table tbody td{
    padding:8px 8px;text-align:center;
    border-bottom:1px solid var(--border);font-size:12px;
}
.part-table tbody tr:active td{background:rgba(56,189,248,0.06);}
.danger-row td{background:rgba(239,68,68,0.05);}
.none-row td{opacity:0.45;}

/* ═══ 요약 모달 ═══ */
#view-summary{
    display:none;position:fixed;inset:0;z-index:500;
    background:var(--bg);flex-direction:column;
}
#view-summary.open{display:flex;}
#view-summary *{user-select:text!important;}
.summary-table{width:100%;border-collapse:collapse;font-size:12px;}
.summary-table th{position:sticky;top:0;background:var(--panel);
    padding:9px 8px;text-align:center;font-weight:700;
    border-bottom:2px solid var(--border);color:var(--acc);font-size:11px;white-space:nowrap;z-index:10;}
.summary-table td{padding:8px 8px;border-bottom:1px solid var(--border);text-align:center;font-size:12px;}
#summary-data-zone{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
.summary-header{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));
    background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;
}

/* ═══ 부서 재고부족 바텀시트 ═══ */
#dept-shortage-modal{
    display:none;position:fixed;inset:0;z-index:600;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
    align-items:flex-end;
}
#dept-shortage-modal.show{display:flex;}
.dept-shortage-sheet{
    width:100%;max-height:75vh;background:var(--panel);
    border-radius:20px 20px 0 0;display:flex;flex-direction:column;
    box-shadow:0 -8px 32px var(--shadow);
    padding-bottom:env(safe-area-inset-bottom);
}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.sheet-head{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px;border-bottom:1px solid var(--border);
}
.sheet-head h3{margin:0;font-size:14px;color:var(--acc);flex:1;}
.sheet-close{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);
    background:var(--bg);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;}
#dept-shortage-zone{flex:1;overflow:auto;}
#dept-shortage-search{flex:1;padding:5px 10px;border:1.5px solid var(--border);
    border-radius:14px;background:var(--bg);color:var(--text);font-size:12px;outline:none;}

/* ═══ 로딩 오버레이 ═══ */
#loading-overlay{
    display:none;position:fixed;inset:0;z-index:9999;
    background:rgba(11,15,25,0.75);backdrop-filter:blur(4px);
    flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#loading-overlay.show{display:flex;}
.loading-spinner-lg{width:50px;height:50px;border:5px solid rgba(56,189,248,0.15);
    border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-msg{color:#e2e8f0;font-size:14px;font-weight:600;margin:0;}

/* ═══ 업로드 카드 ═══ */
#view-upload{display:none;position:fixed;inset:0;z-index:800;
    background:var(--bg);align-items:center;justify-content:center;}
#view-upload.show{display:flex;}
.upload-card{background:var(--panel);border-radius:20px;padding:40px 28px;
    text-align:center;max-width:380px;width:90%;
    border:2px dashed var(--acc);box-shadow:0 16px 48px var(--shadow);}
.upload-card h2{margin:0 0 10px;font-size:18px;}

/* ═══ PC 보완 ═══ */
@media(min-width:768px){
    #topbar{padding:12px 24px;}
    .home-header{padding:14px 20px 8px;}
    #factory-wrap{padding:16px;}
    .dept-header-bar{padding:10px 20px;}
    #dynamic-factory-map{padding:12px;}
    #dynamic-factory-map td{font-size:12px!important;padding:10px 6px!important;}
    .part-table{font-size:13px;}
    .part-table thead th{font-size:12px;padding:11px 12px;}
    .part-table tbody td{font-size:13px;padding:10px 12px;}
}
/* 부서 뷰 badge (원본 호환) */
.zone-wrapper{position:relative;display:inline-block;}
.shortage-badge{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;
    font-size:10px;font-weight:900;border-radius:50%;min-width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;border:2px solid var(--panel);
    pointer-events:none;z-index:10;}
/* 전역 변수 원본 호환 */
:root{--accent-glow:#38bdf8;--primary-gradient:linear-gradient(135deg,#1e3c72,#2a5298);}
</style>
</head>
<body>
<div id="app">

  <!-- 상단 바 -->
  <div id="topbar">
    <span class="logo">⚙️ TaeguTec</span>
    <div id="search-box">
      <input id="global-search" type="text" placeholder="🔍 부품 검색..."
        oninput="onGlobalSearch(this.value)"
        onblur="hideSearchDropdown()"
        onfocus="if(this.value.trim())onGlobalSearch(this.value)">
      <span class="search-icon-inner">⌕</span>
      <div id="search-dropdown"></div>
    </div>
    <div class="topbar-btns">
      <button class="tb-btn" onclick="toggleTheme()">🌓</button>
      <button class="tb-btn" id="home-top-btn" onclick="goHome()" style="display:none">🏠</button>
    </div>
  </div>

  <!-- 페이지 영역 -->
  <div id="pages">

    <!-- 홈: 공장 배치도 -->
    <div class="page active" id="page-home">
      <div class="home-header">
        <h2>🏭 공장 배치도</h2>
        <div class="home-actions">
          <span class="last-update-sm" id="last-update-txt">Last Update: -</span>
          <button class="shortage-all-btn" onclick="openSummaryModal()">⚠️ 전체 재고부족</button>
        </div>
      </div>
      <div id="factory-wrap">
<svg viewBox="0 0 910 370" xmlns="http://www.w3.org/2000/svg" id="factory-svg">

            <!-- 전체 배경 (연회색 - 사잇길/바닥 표현, 다크모드는 CSS로 처리) -->
            <rect width="910" height="370" rx="8" class="factory-bg-rect"/>

            <!-- ════════════════════════════
                 1행 (y=10, h=100)
            ════════════════════════════ -->

            <!-- IMC ENDMILL: x=10, y=10, w=270, h=100 -->
            <rect class="zone-dept" x="10" y="10" width="270" height="100" rx="5"
                  onclick="openDept('IMC ENDMILL')" id="zone-IMC ENDMILL"/>
            <text class="zlabel" x="145" y="60">IMC ENDMILL</text>

            <!-- 원료: x=296, y=10, w=100, h=100 -->
            <rect class="zone-dept" x="296" y="10" width="100" height="100" rx="5"
                  onclick="openDept('원료')" id="zone-원료"/>
            <text class="zlabel" x="346" y="60">원료</text>

            <!-- M/C: x=406, y=10, w=96, h=100
                 (점선 경계는 금형1/합금1과 묶인 영역으로 처리)
                 이미지에서 M/C | 금형1 | 합금1 이 한 블록처럼 붙어있음 -->
            <rect class="zone-dept" x="406" y="10" width="88" height="100" rx="5"
                  onclick="openDept('M/C')" id="zone-MC"/>
            <text class="zlabel" x="450" y="60">M/C</text>

            <!-- 금형1: x=504, y=10, w=84, h=100 -->
            <rect class="zone-dept" x="504" y="10" width="84" height="100" rx="5"
                  onclick="openDept('금형1')" id="zone-금형1"/>
            <text class="zlabel" x="546" y="60">금형1</text>

            <!-- 합금1: x=598, y=10, w=88, h=100 -->
            <rect class="zone-dept" x="598" y="10" width="88" height="100" rx="5"
                  onclick="openDept('합금1')" id="zone-합금1"/>
            <text class="zlabel" x="642" y="60">합금1</text>

            <!-- 드릴: x=702, y=10, w=100, h=100 -->
            <rect class="zone-dept" x="702" y="10" width="100" height="100" rx="5"
                  onclick="openDept('드릴')" id="zone-드릴"/>
            <text class="zlabel" x="752" y="60">드릴</text>

            <!-- 세라믹: x=812, y=10, w=88, h=100 -->
            <rect class="zone-dept" x="812" y="10" width="88" height="100" rx="5"
                  onclick="openDept('세라믹')" id="zone-세라믹"/>
            <text class="zlabel" x="856" y="60">세라믹</text>

            <!-- ════════════════════════════
                 2행 (y=126, h=130)
                 코팅2(x=10,w=84,h=130 전체)
                 연삭2(x=104,w=84,h=130 전체)
                 금형2(x=198,w=82,h=57)
                 합금2(x=198,w=82,h=57, y=198)
                 QA  (x=10,w=84,h=44, y=212) - 이미지상 코팅2 하단에 붙음
            ════════════════════════════ -->

            <!-- 코팅2: x=10, y=126, w=84, h=88 -->
            <rect class="zone-dept" x="10" y="126" width="84" height="88" rx="5"
                  onclick="openDept('코팅2')" id="zone-코팅2"/>
            <text class="zlabel" x="52" y="170">코팅2</text>

            <!-- QA: x=10, y=224, w=84, h=42 (코팅2 바로 아래) -->
            <rect class="zone-dept" x="10" y="224" width="84" height="42" rx="5"
                  onclick="openDept('QA')" id="zone-QA"/>
            <text class="zlabel" x="52" y="245">QA</text>

            <!-- 연삭2: x=104, y=126, w=84, h=140 (코팅2+QA 합친 높이) -->
            <rect class="zone-dept" x="104" y="126" width="84" height="140" rx="5"
                  onclick="openDept('연삭2')" id="zone-연삭2"/>

<script>

/* ══ 전역 상태 ══ */
let excelWorkbook = null;
let globalStockCache  = {};
let globalShortageList = []; // {sheetName, row, hdr, iStk, stk}
let globalSearchIndex  = []; // {sheet, itemNo, type, desc, stock, shortage, display}
let currentSortDirection = {};
let currentDeptName = '';

let isPanning=false, isRotating=false;
let prevMouseX=0, prevMouseY=0;
let currentRx=0, currentRy=0, currentRz=0;
let currentTx=0, currentTy=0, currentZoom=0.95;
let orbitAbortController=null;
let currentViewId='home';

/* ══ 초기화 ══ */
function initApp(buf){
    showLoading('데이터 처리 중...');
    setTimeout(()=>{
        try{
            excelWorkbook = XLSX.read(new Uint8Array(buf), {type:'array',cellFormula:false,cellHTML:false});
        }catch(e){ hideLoading(); showUpload(); return; }
        buildStockCache();
        loadLastUpdate();
        hideLoading();
        document.getElementById('home-top-btn').style.display='none';
        setTimeout(buildBackgroundData, 400);
    },30);
}
function showUpload(){
    document.getElementById('view-upload').classList.add('show');
}

/* 파일 직접 선택 */
document.getElementById('file-loader').addEventListener('change', e=>{
    if(e.target.files[0]) processExcel(e.target.files[0]);
});

window.addEventListener('load', ()=>{
    showLoading('SPL.xlsx 불러오는 중...');
    fetch('SPL.xlsx')
        .then(r=>{ if(!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf=>initApp(buf))
        .catch(()=>{ hideLoading(); showUpload(); });
});

function processExcel(file) {
    const r = new FileReader();
    r.onload = e=>{
        showLoading('파일 읽는 중...');
        setTimeout(()=>{
            excelWorkbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            buildStockCache();
            loadLastUpdate();
            setup3DOrbit();
            hideLoading();
            showView('home');
            document.getElementById('home-top-btn').style.display='inline-block';
            setTimeout(buildBackgroundData, 400);
        }, 30);
    };
    r.readAsArrayBuffer(file);
}

function buildStockCache() {
    const s = excelWorkbook.Sheets['RawData'];
    if(!s) return;
    XLSX.utils.sheet_to_json(s,{header:1}).forEach((row,i)=>{
        if(i===0||!row[0]) return;
        globalStockCache[String(row[0]).trim()] = row[1]??0;
    });
}

/* ══ 로딩 ══ */
function showLoading(msg) {
    document.getElementById('loading-msg').textContent = msg||'처리 중...';
    document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('show');
}

/* ══ Last Update ══ */
function loadLastUpdate() {
    if(!excelWorkbook) return;
    const s = excelWorkbook.Sheets['HOME'];
    if(!s) return;
    const cell = s['V28'];
    if(!cell) return;
    const val = String(cell.w||cell.v||'').trim();
    if(!val) return;
    const el = document.getElementById('last-update-txt');
    if(el) el.textContent = 'Last Update: '+val;
}

/* ══ 백그라운드 처리 ══
   모든 장비 시트를 4개씩 청크로 순회
   I열(idx=8)=현재재고, J열(idx=9)=안전재고 (고정 + 헤더 탐색 병행)
*/
function buildBackgroundData() {
    if(!excelWorkbook) return;
    globalShortageList = [];
    globalSearchIndex  = [];
    const shortageMap  = {};
    const SKIP = ['RawData','종합현황','HOME','Sheet1','Robot','전기','공통','Automation list','Automation List','Fanuc robot','Fanuc Robot','FANUC ROBOT'];
    const sheets = excelWorkbook.SheetNames.filter(n=>
        !SKIP.some(s=>n.toLowerCase()===s.toLowerCase())
    );
    let idx=0;

    function parseOneSheet(sName) {
        const sheet = excelWorkbook.Sheets[sName];
        if(!sheet||!sheet['!ref']) return;
        const matrix = XLSX.utils.sheet_to_json(sheet,{header:1});
        let hi=-1;
        // 진짜 헤더 행 = 컬럼 키워드를 '여러 개' 가진 행
        // (제목 행은 셀 하나에 'Part List' 같은 긴 문장만 있어서 제외됨)
        for(let i=0;i<Math.min(matrix.length,15);i++){
            const r=matrix[i];
            if(!r) continue;
            const cells = r.map(v=>String(v||'').trim().toLowerCase());
            let score=0;
            cells.forEach(c=>{
                if(c==='type') score++;
                if(c==='part') score++;
                if(c==='model') score++;
                if(c.replace(/ /g,'')==='itemno'||c.replace(/ /g,'')==='itemno.') score++;
                if(c.includes('description')) score++;
                if(c==='재고') score++;
                if(c.replace(/ /g,'')==='safetyqty') score++;
            });
            // 키워드 2개 이상이면 진짜 헤더 행
            if(score>=2){hi=i;break;}
        }
        if(hi<0) return;
        // Kobayashi 디버그

        const hdr = matrix[hi].map(h=>h?String(h).trim():'');
        const iiNo = hdr.findIndex(h=>{if(!h)return false;const c=h.toLowerCase().replace(/ /g,'').replace(/\.$/,'');return c=='itemno';});
        const iType= hdr.findIndex(h=>h&&h==='Type');
        const iDesc= hdr.findIndex(h=>h&&(h.toLowerCase().includes('desc')||h==='Part Name'));
        // 재고 컬럼: '재고' 또는 '현재 재고' (Safety 글자 없는 순수 재고)
        let iStk = hdr.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase();return (t==='재고'||t==='현재 재고'||t==='현재재고'||tl==='stock'||tl==='qty')&&!tl.includes('safety');});
        // 안전재고 컬럼: 'Safety'(짧은형) 또는 'Safety Qty' 또는 '안전'
        let iSfy = hdr.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase().replace(/ /g,'');return tl==='safety'||tl==='safetyqty'||tl==='safetystock'||t==='안전 재고'||t==='안전재고'||t.includes('안전');});
        // Safety Qty 헤더가 없는 시트는 처리하지 않음
        if(iSfy<0) return;
        // 재고 컬럼도 없으면 고정 인덱스 폴백
        if(iStk<0) iStk=iSfy-1;

        let cnt=0;
        matrix.slice(hi+1).forEach(row=>{
            if(!row||!row.join('')) return;
            const itemNo= iiNo>=0?String(row[iiNo]||'').trim():'';
            const type  = iType>=0?String(row[iType]||'').trim():'';
            const desc  = iDesc>=0?String(row[iDesc]||'').trim():'';
            if(!itemNo&&!type&&!desc) return;
            // 재고: RawData 캐시 우선 (0도 유효한 값)
            const stk = (itemNo && itemNo!=='' && globalStockCache[itemNo] !== undefined)
                ? globalStockCache[itemNo]
                : (row[iStk] !== undefined ? row[iStk] : 0);
            // Safety Qty: iSfy 위치가 비어있으면 인접 열(+1, +2)도 탐색
            // Safety Qty: 해당 열이 비어있으면 +1열만 허용 (병합셀 대응)
            const sfyRaw = row[iSfy];
            const sfy=parseFloat(String(sfyRaw||'').replace(/,/g,''));
            // stk: 0도 유효한 재고값
            const ns = (stk===0||stk==='0') ? 0 : parseFloat(String(stk||'').replace(/,/g,''));
            const shortage=!isNaN(ns)&&!isNaN(sfy)&&sfy>0&&ns<sfy;
            if(sName==='Kobayashi'&&shortage) console.log('[KOB부족]',itemNo,'stk=',stk,'ns=',ns,'sfy=',sfy);
            if(sName==='Kobayashi'&&itemNo==='950112'){
                console.log('[KOB950112] 전체row:', JSON.stringify(row));
                console.log('[KOB950112] iStk=',iStk,'iSfy=',iSfy,'stk=',stk,'sfyRaw=',sfyRaw,'sfy=',sfy,'ns=',ns);
            }

            globalSearchIndex.push({sheet:sName,itemNo,type,desc,stock:stk,shortage,
                display:[sName,itemNo,type,desc,...row.slice(0,12).map(v=>String(v||''))].join(' ')});
            if(shortage){
                cnt++;
                globalShortageList.push({sheetName:sName, row, hdr, iStk, stk});
            }
        });
        if(cnt>0) shortageMap[sName]=cnt;
    }

    function processChunk() {
        sheets.slice(idx,idx+4).forEach(parseOneSheet);
        idx+=4;
        if(idx<sheets.length){ setTimeout(processChunk,10); }
        else {
            console.log('[SPL] 완료:',sheets.length,'시트,',globalShortageList.length,'부족항목, shortageMap:', JSON.stringify(shortageMap));
            updateSVGBadges(shortageMap);
        }
    }
    processChunk();
}

/* ══ SVG 뱃지 업데이트 ══ */
const DEPT_BADGE = {
    'IMC ENDMILL':'IMC-ENDMILL','원료':'원료','MC':'MC','금형1':'금형1',
    '합금1':'합금1','드릴':'드릴','세라믹':'세라믹','코팅2':'코팅2',
    'QA':'QA','연삭2':'연삭2','금형2':'금형2','합금2':'합금2',
    'Roll':'Roll','연삭1':'연삭1','코팅1':'코팅1','가공':'가공'
};

function updateSVGBadges(shortageMap) {
    document.querySelectorAll('g[id^="badge-"]').forEach(el=>el.style.display='none');
    if(!excelWorkbook||!Object.keys(shortageMap).length) return;

    // 각 부서 배치도에서 linkSheet 목록 수집 → 부서별 합산
    Object.keys(DEPT_BADGE).forEach(deptName=>{
        const sName = deptName==='M/C'?'MC':deptName;
        const sheet = excelWorkbook.Sheets[sName];
        if(!sheet||!sheet['!ref']) return;
        const range = XLSX.utils.decode_range(sheet['!ref']);
        const links = new Set();
        for(let r=0;r<=range.e.r;r++){
            for(let c=26;c<=Math.min(range.e.c,51);c++){
                const cell=sheet[XLSX.utils.encode_cell({r,c})];
                if(!cell||!cell.v) continue;
                let lk=String(cell.v).trim();
                if(cell.l&&cell.l.Target){
                    const raw=String(cell.l.Target);
                    if(raw.startsWith('#')) lk=raw.substring(1).split('!')[0].replace(/^'|'$/g,'').trim();
                }
                links.add(lk);
            }
        }
        // shortageMap 키와 매칭
        let total=0;
        links.forEach(lk=>{
            const lLow=lk.toLowerCase().replace(/\s/g,'');
            Object.entries(shortageMap).forEach(([src,cnt])=>{
                const sLow=src.toLowerCase().replace(/\s/g,'');
                if(lLow===sLow||lLow.includes(sLow)||sLow.includes(lLow)) total+=cnt;
            });
        });

function resetCam(){

function autoFitZoom(){

/* ══ 유틸 ══ */
function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function getDynamicCubeColors(name){
    let raw=String(name).trim().toUpperCase();
    const xsMatch=raw.match(/^(6[012]\d)XS/);
    if(xsMatch){
        const h={'628':30,'620':195,'629':140}[xsMatch[1]]??200;
        return{top:`hsla(${h},80%,62%,0.50)`,front:`hsla(${h},70%,48%,0.58)`,left:`hsla(${h},65%,40%,0.58)`};
    }
    let p=raw.split(/[#\d\s\-]/)[0]||raw;
    const map={OKANO:160,COMBI:135,CENTRO:195,QUATTRO:95,AP460:280,GIG:20,APX:220,NICOLIS:320,FUJI:50,ANCA:260,PUMA:340};
    const f=Object.keys(map).find(k=>p.includes(k));
    let hue=0;
    if(f){hue=map[f];}else{let h=0;for(let i=0;i<p.length;i++)h=p.charCodeAt(i)+((h<<5)-h);hue=Math.abs(h)%360;}
    return{top:`hsla(${hue},85%,60%,0.45)`,front:`hsla(${hue},75%,45%,0.55)`,left:`hsla(${hue},70%,40%,0.55)`};
}

/* ══ 시트명 탐색 ══ */
function findSheet(key){
    if(!excelWorkbook||!key) return null;
    const names=excelWorkbook.SheetNames;
    const clean=s=>String(s).trim().toLowerCase().replace(/[\s#]/g,'');
    // 1. 완전일치
    let r=names.find(n=>n===key); if(r) return r;
    // 2. 정규화 일치
    r=names.find(n=>clean(n)===clean(key)); if(r) return r;
    // 3. 포함
    r=names.find(n=>clean(n).includes(clean(key))||clean(key).includes(clean(n))); if(r) return r;
    return null;
}

/* ══ 2D 배치도 렌더링 ══ */
function render3DMap(sheet, mapStartCol){
    const mapZone=document.getElementById('dynamic-factory-map');
    mapZone.innerHTML='';
    const range=XLSX.utils.decode_range(sheet['!ref']);
    const maxR=range.e.r, maxC=Math.min(range.e.c,51);
    if(mapStartCol>maxC){mapZone.innerHTML='<p style="padding:40px;text-align:center;color:#888">데이터 없음</p>';return;}

    const DEF=8.43,NARROW=2.5;
    const cw={};
    if(sheet['!cols']) sheet['!cols'].forEach((c,i)=>{if(c)cw[i]=c.wch??DEF;});
    const wch=c=>cw[c]??DEF;
    const isTunnel=c=>wch(c)<NARROW;
    const usedCols=[];
    for(let c=mapStartCol;c<=maxC;c++) if(!isTunnel(c)) usedCols.push(c);
    if(!usedCols.length) return;

    const grid={};
    for(let r=0;r<=maxR;r++){grid[r]={};for(let c=mapStartCol;c<=maxC;c++)grid[r][c]={cell:sheet[XLSX.utils.encode_cell({r,c})],isMerged:false,rowspan:1,colspan:1,text:''};}
    if(sheet['!merges']){
        sheet['!merges'].forEach(m=>{
            if(m.e.c<mapStartCol||m.s.c>maxC||m.s.r>maxR) return;
            const sR=Math.max(m.s.r,0),eR=Math.min(m.e.r,maxR);
            const sC=Math.max(m.s.c,mapStartCol),eC=Math.min(m.e.c,maxC);
            const oc=sheet[XLSX.utils.encode_cell({r:m.s.r,c:m.s.c})];
            const txt=oc?String(oc.v??'').trim():'';
            if(grid[sR]?.[sC]){grid[sR][sC].rowspan=eR-sR+1;grid[sR][sC].colspan=eC-sC+1;grid[sR][sC].text=txt;}
            for(let r=sR;r<=eR;r++) for(let c=sC;c<=eC;c++){if(r===sR&&c===sC)continue;if(grid[r]?.[c])grid[r][c].isMerged=true;}
        });
    }
    const usedRows=[];
    for(let r=0;r<=maxR;r++){let has=false;for(const c of usedCols)if(grid[r]?.[c]?.cell?.v||grid[r]?.[c]?.text){has=true;break;}if(has)usedRows.push(r);}
    if(!usedRows.length) return;

    const ROOM_KW=['Press','Sinter','Sand','합금','금형','연삭','코팅','가공','구역','M/C','Robot','QA','IMC'];
    const isRoomHeader=val=>ROOM_KW.some(k=>val===k||(val.startsWith(k)&&/^[\s\d_\-\/]*$/.test(val.slice(k.length))));
    const HPAL=[
        {bg:'rgba(219,234,254,0.9)',bd:'#93c5fd',tx:'#1d4ed8'},
        {bg:'rgba(254,215,170,0.9)',bd:'#fdba74',tx:'#c2410c'},
        {bg:'rgba(187,247,208,0.9)',bd:'#86efac',tx:'#15803d'},
        {bg:'rgba(233,213,255,0.9)',bd:'#d8b4fe',tx:'#7e22ce'},
        {bg:'rgba(207,250,254,0.9)',bd:'#67e8f9',tx:'#0e7490'},
        {bg:'rgba(254,249,195,0.9)',bd:'#fcd34d',tx:'#b45309'},
        {bg:'rgba(254,202,202,0.9)',bd:'#fca5a5',tx:'#b91c1c'},
        {bg:'rgba(209,250,229,0.9)',bd:'#6ee7b7',tx:'#065f46'},
    ];
    let palIdx=0; const headerRowPal={};
    for(const r of usedRows){for(const c of usedCols){const gc=grid[r]?.[c];if(!gc||gc.isMerged)continue;const val=gc.text||(gc.cell?String(gc.cell.v??'').trim():'');if(val&&isRoomHeader(val)){if(!(r in headerRowPal))headerRowPal[r]=HPAL[palIdx++%HPAL.length];break;}}}

    const totalW=usedCols.reduce((s,c)=>s+Math.max(wch(c),3),0);
    const calcSpan=(sC,raw)=>{let s=0;for(let ci=sC;ci<sC+raw&&ci<=maxC;ci++)if(!isTunnel(ci))s++;return Math.max(1,s);};
    const clickMap={};let cellId=0;

    let t='<table><colgroup>';
    usedCols.forEach(c=>{t+=`<col style="width:${(Math.max(wch(c),3)/totalW*100).toFixed(1)}%">`;});
    t+='</colgroup><tbody>';
    for(const r of usedRows){
        const isHRow=r in headerRowPal;
        t+='<tr>';
        for(const c of usedCols){
            const gc=grid[r]?.[c];
            if(!gc||gc.isMerged)continue;
            const cs=calcSpan(c,gc.colspan);
            let rs=0;for(let ri=r;ri<r+gc.rowspan&&ri<=maxR;ri++)if(usedRows.includes(ri))rs++;rs=Math.max(1,rs);
            const val=gc.text||(gc.cell?String(gc.cell.v??'').trim():'');
            if(!val){t+=`<td colspan="${cs}" rowspan="${rs}"></td>`;continue;}
            if(isRoomHeader(val)&&isHRow){
                const p=headerRowPal[r];
                t+=`<td colspan="${cs}" rowspan="${rs}" style="background:${p.bg};border:2px solid ${p.bd};border-radius:7px;text-align:center;font-weight:900;color:${p.tx};vertical-align:middle">${escapeHtml(val)}</td>`;
                continue;
            }
            let linkSheet=val;
            if(gc.cell&&gc.cell.l&&gc.cell.l.Target){
                const raw=String(gc.cell.l.Target);
                if(raw.startsWith('#'))linkSheet=raw.substring(1).split('!')[0].replace(/^'|'$/g,'').trim();
            }
            const col=getDynamicCubeColors(val);
            const eid='e'+(cellId++);
            clickMap[eid]={val,link:linkSheet};
            t+=`<td colspan="${cs}" rowspan="${rs}" data-eid="${eid}"
                style="background:${col.top};border:2px solid ${col.front};
                border-radius:7px;text-align:center;color:var(--cube-text-color);
                vertical-align:middle;word-break:break-word;cursor:pointer;">${escapeHtml(val)}</td>`;
        }
        t+='</tr>';
    }
    t+='</tbody></table>';
    mapZone.innerHTML=t;

    // 이벤트 위임
    mapZone.onclick=e=>{
        const td=e.target.closest('td[data-eid]');
        if(td){const info=clickMap[td.dataset.eid];if(info)openPartsModal(info.val,info.link);}
    };
    mapZone.addEventListener('touchend',e=>{
        const td=e.target.closest('td[data-eid]');
        if(td){e.preventDefault();const info=clickMap[td.dataset.eid];if(info)openPartsModal(info.val,info.link);}
    },{passive:false});
}

    const dir=deptShortageSortDir[ci]==='desc'?'asc':'desc'; deptShortageSortDir[ci]=dir;
    const rows=Array.from(tbody.querySelectorAll('tr'));
    rows.sort((a,b)=>{const ca=a.cells[ci]?.innerText.trim()??'',cb=b.cells[ci]?.innerText.trim()??'';const na=parseFloat(ca.replace(/,/g,'')),nb=parseFloat(cb.replace(/,/g,''));if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;return dir==='asc'?ca.localeCompare(cb,'ko'):cb.localeCompare(ca,'ko');});
    rows.forEach(r=>tbody.appendChild(r));
    tbl.querySelectorAll('th').forEach((th,i)=>{th.innerText=th.innerText.replace(/ [↑↓]$/g,'');if(i===ci)th.innerText+=dir==='asc'?' ↑':' ↓';});
}

/* ══ 스페어파트 팝업 ══ */
function openPartsModal(displayKey, targetSheetName){
    document.getElementById('parts-search').value='';
    currentSortDirection={};
    const actualSheet=findSheet(targetSheetName||displayKey)||(targetSheetName?findSheet(displayKey):null);
    const zone=document.getElementById('parts-data-zone');
    document.getElementById('lbl-parts-title').innerText=`⚙️ 장비 [ ${displayKey} ] 스페어파트 내역`;

    if(!actualSheet){
        zone.innerHTML=`<div style="padding:40px;text-align:center;color:#ef4444;font-weight:bold;">연동 오류: [${escapeHtml(targetSheetName||displayKey)}] 시트 없음</div>`;
        showView('parts'); return;
    }
    const sheet=excelWorkbook.Sheets[actualSheet];
    const matrix=XLSX.utils.sheet_to_json(sheet,{header:1});
    if(!matrix.length){zone.innerHTML=`<p style="text-align:center;color:#888;padding:30px;">데이터 없음</p>`;showView('parts');return;}

    let hi=0;
    for(let i=0;i<Math.min(matrix.length,15);i++){
        const r=matrix[i];if(!r)continue;
        const cells=r.map(v=>String(v||'').trim().toLowerCase());
        let score=0;
        cells.forEach(c=>{
            if(c==='type')score++;if(c==='part')score++;if(c==='model')score++;
            if(c.replace(/ /g,'').replace(/\.$/,'')==='itemno')score++;
            if(c.includes('description'))score++;if(c==='재고')score++;
            if(c.replace(/ /g,'')==='safetyqty')score++;
        });
        if(score>=2){hi=i;break;}
    }
    const headers=matrix[hi].map(h=>h?String(h).trim():'');
    const dataRows=matrix.slice(hi+1);
    const iiNo=headers.findIndex(h=>{if(!h)return false;const c=h.toLowerCase().replace(/ /g,'').replace(/\.$/,'');return c=='itemno';});
    let iStk=headers.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase();return (t==='재고'||t==='현재 재고'||t==='현재재고'||tl==='stock'||tl==='qty')&&!tl.includes('safety');});
    let iSfy=headers.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase().replace(/ /g,'');return tl==='safety'||tl==='safetyqty'||tl==='safetystock'||t==='안전 재고'||t==='안전재고'||t.includes('안전');});
    if(iStk>=0&&iSfy<0) iSfy=iStk+1;
    if(iStk<0) iStk=6;
    if(iSfy<0) iSfy=iStk+1;

    const hideIdx=headers.reduce((a,h,i)=>{const c=(h||'').toLowerCase().replace(/ /g,'');if(c==='vendor'||c==='벤더'||c.includes('사진')||c==='k')a.push(i);return a;},[]);
    const visMap=[];
    headers.forEach((h,i)=>{if(!hideIdx.includes(i))visMap.push(i);});

    let html=`<table class="part-table"><thead><tr>`;
    visMap.forEach((origIdx,visIdx)=>{
        const h=headers[origIdx];
        const left=['part','model','description','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
        html+=`<th style="text-align:${left?'left;padding-left:20px':'center'}" onclick="executeTableSort(${visIdx})">${escapeHtml(h)}</th>`;
    });
    html+=`</tr></thead><tbody>`;
    let count=0;
    dataRows.forEach(row=>{
        if(!row?.length||!row.join(''))return;
        if(row.join('').includes('Part List'))return;
        const cv=row.map((v,i)=>hideIdx.includes(i)?'':(v!==undefined?String(v).trim():''));
        if(!cv.some(v=>v!==''&&v!=='0'&&v!=='None'))return;
        count++;
        const itemNo=iiNo>=0?String(row[iiNo]||'').trim():null;
        const stk = (itemNo && itemNo!=='' && globalStockCache[itemNo] !== undefined)
                ? globalStockCache[itemNo]
                : (row[iStk] !== undefined ? row[iStk] : 0);
        const sfyRaw2=row[iSfy];
        let sq=parseFloat(String(sfyRaw2||'').replace(/,/g,''));if(isNaN(sq))sq=0;
        let cls='';
        if(stk==='None')cls='none-row';
        else{const ns=parseFloat(String(stk).replace(/,/g,''));if(!isNaN(ns)&&sq>0&&ns<sq)cls='danger-row';}
        const rawAttrs=visMap.map((origIdx,visIdx)=>{const raw=origIdx===iStk?stk:(row[origIdx]!==undefined?row[origIdx]:'');return `data-raw-${visIdx}="${escapeHtml(String(raw))}"`;}).join(' ');
        html+=`<tr class="${cls}" ${rawAttrs}>`;
        visMap.forEach(origIdx=>{
            const h=headers[origIdx];
            const left=['part','model','description','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
            const v=origIdx===iStk?stk:(row[origIdx]!==undefined?row[origIdx]:'');
            html+=`<td style="text-align:${left?'left;padding-left:20px':'center'}">${escapeHtml(String(v))}</td>`;
        });
        html+=`</tr>`;
    });
    zone.innerHTML=count?html+`</tbody></table>`:`<p style="text-align:center;color:#888;padding:30px;">부품 내역 없음</p>`;
    document.getElementById('view-parts').style.display='flex';
}

/* ══ 정렬/필터 ══ */
function _sortTable(sel,colIdx,key){
    const tbl=document.querySelector(sel);if(!tbl)return;
    const tbody=tbl.querySelector('tbody');
    const dir=currentSortDirection[key]==='desc'?'asc':'desc'; currentSortDirection[key]=dir;
    const rows=Array.from(tbody.querySelectorAll('tr')).filter(r=>r.querySelector('td'));
    rows.sort((a,b)=>{
        const ra=a.getAttribute(`data-raw-${colIdx}`)??a.cells[colIdx]?.innerText.trim()??'';
        const rb=b.getAttribute(`data-raw-${colIdx}`)??b.cells[colIdx]?.innerText.trim()??'';
        const na=parseFloat(String(ra).replace(/,/g,'')),nb=parseFloat(String(rb).replace(/,/g,''));
        if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;
        return dir==='asc'?String(ra).localeCompare(String(rb),'ko'):String(rb).localeCompare(String(ra),'ko');
    });
    rows.forEach(r=>tbody.appendChild(r));
    tbl.querySelectorAll('th').forEach((th,i)=>{th.innerText=th.innerText.replace(/ [↑↓]$/g,'');if(i===colIdx)th.innerText+=dir==='asc'?' ↑':' ↓';});
}
function executeTableSort(ci){_sortTable('.part-table',ci,ci);}
function executeSummarySort(ci){_sortTable('.summary-table',ci,'s_'+ci);}
function filterPartsTable(){
    const q=document.getElementById('parts-search').value.toLowerCase().trim();
    document.querySelectorAll('#parts-data-zone tbody tr').forEach(r=>{r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';});
}
function filterSummaryTable(){
    const q=document.getElementById('summary-search').value.toLowerCase().trim();
    document.querySelectorAll('#summary-data-zone tbody tr').forEach(r=>{r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';});
}
function filterModalTable(){ filterPartsTable(); }
function closePartsModal(e){ document.getElementById('view-parts').classList.remove('open'); }
function goBackFromParts(){ closePartsModal(null); }
function closeSummaryView(){ document.getElementById('view-summary').classList.remove('open'); }



</script>
