<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TaeguTec SPL</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root[data-theme="dark"] {
    --bg: #0b0f19; --panel: #141b2d; --text: #f8fafc;
    --muted: #94a3b8; --border: #1f293d; --shadow: rgba(0,0,0,0.6);
    --card-bg: #1e2535; --header-bg: #141b2d;
}
:root[data-theme="light"] {
    --bg: #f1f5f9; --panel: #ffffff; --text: #0f172a;
    --muted: #64748b; --border: #e2e8f0; --shadow: rgba(148,163,184,0.15);
    --card-bg: #ffffff; --header-bg: #ffffff;
}
:root {
    --accent: #38bdf8;
    --accent-dark: #0ea5e9;
    --primary: linear-gradient(135deg,#1e3c72,#2a5298);
    --danger: #ef4444;
    --safe: #22c55e;
    --rx:0deg; --ry:0deg; --rz:0deg; --tx:0px; --ty:0px; --zoom:0.95; --cube-h:50px;
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
    font-family:'Segoe UI','Malgun Gothic',Apple SD Gothic Neo,sans-serif;
    margin:0;padding:0;background:var(--bg);color:var(--text);
    overflow-x:hidden;user-select:none;
    transition:background 0.2s,color 0.2s;
    padding-bottom:env(safe-area-inset-bottom);
}

/* ══ 헤더 ══ */
header{
    position:sticky;top:0;z-index:200;
    background:var(--header-bg);
    border-bottom:1px solid var(--border);
    box-shadow:0 2px 12px var(--shadow);
    height:56px;padding:0 16px;
    display:flex;align-items:center;justify-content:space-between;
}
.hd-left{display:flex;align-items:center;gap:10px;}
.hd-logo{font-size:18px;font-weight:900;color:var(--accent);letter-spacing:-0.5px;}
.hd-sub{font-size:11px;color:var(--muted);}
.hd-right{display:flex;align-items:center;gap:8px;}
.icon-btn{
    width:36px;height:36px;border-radius:50%;
    border:1.5px solid var(--border);background:var(--card-bg);
    color:var(--text);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.15s;
}
.icon-btn:active{transform:scale(0.92);}

/* ══ 검색바 ══ */
.search-wrap{
    padding:10px 16px;background:var(--panel);
    border-bottom:1px solid var(--border);
    position:sticky;top:56px;z-index:199;
}
.search-inner{position:relative;}
.search-input{
    width:100%;padding:10px 40px 10px 16px;
    border:1.5px solid var(--border);border-radius:24px;
    background:var(--bg);color:var(--text);font-size:14px;
    outline:none;transition:border-color 0.2s;
}
.search-input:focus{border-color:var(--accent);}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;}
#search-dropdown{
    display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:var(--panel);border:1px solid var(--border);
    border-radius:12px;box-shadow:0 8px 24px var(--shadow);
    max-height:60vh;overflow-y:auto;z-index:500;
}
#search-dropdown.show{display:block;}
.sri{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.sri:last-child{border-bottom:none;}
.sri:active{background:rgba(56,189,248,0.08);}
.sri-machine{font-size:13px;font-weight:700;color:var(--accent);}
.sri-part{font-size:12px;color:var(--text);margin-top:2px;}
.sri-stock{font-size:11px;color:var(--muted);margin-top:2px;}

/* ══ 뷰 전환 ══ */
.view{display:none;}
.view.active{display:block;}

/* ══ 홈 – 부서 카드 그리드 ══ */
#view-home{padding:12px 16px 24px;}
.home-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:12px;flex-wrap:wrap;gap:8px;
}
.home-title{font-size:16px;font-weight:800;color:var(--accent);margin:0;}
.home-actions{display:flex;gap:8px;align-items:center;}
.last-update{font-size:11px;color:var(--muted);background:var(--card-bg);
    padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.shortage-all-btn{
    padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;
    border:1.5px solid #fca5a5;background:#fef2f2;color:#b91c1c;cursor:pointer;
    transition:all 0.15s;
}
.shortage-all-btn:active{background:#fee2e2;}

.dept-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}
@media(min-width:480px){.dept-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.dept-grid{grid-template-columns:repeat(4,1fr);gap:16px;}}
@media(min-width:1024px){.dept-grid{grid-template-columns:repeat(5,1fr);}}

.dept-card{
    background:var(--card-bg);border:1.5px solid var(--border);
    border-radius:16px;padding:20px 12px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    cursor:pointer;transition:all 0.18s;
    position:relative;overflow:hidden;
    box-shadow:0 2px 8px var(--shadow);
    min-height:100px;
}
.dept-card:active{transform:scale(0.96);box-shadow:0 1px 4px var(--shadow);}
.dept-card::before{
    content:'';position:absolute;inset:0;
    background:var(--primary);opacity:0;transition:opacity 0.18s;
    border-radius:14px;
}
.dept-card:active::before{opacity:0.06;}
.dept-card.has-shortage{border-color:#fca5a5;background:linear-gradient(135deg,#fef2f2,var(--card-bg));}
.dept-icon{font-size:28px;line-height:1;}
.dept-name{font-size:14px;font-weight:700;color:var(--text);text-align:center;}
.dept-badge{
    position:absolute;top:8px;right:8px;
    background:var(--danger);color:#fff;
    font-size:10px;font-weight:900;
    border-radius:10px;padding:2px 6px;
    min-width:20px;text-align:center;
}

/* ══ 부서 뷰 ══ */
#view-dept{padding:0;}
.dept-topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:var(--panel);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:150;
}
.back-btn{
    width:36px;height:36px;border-radius:50%;
    border:1.5px solid var(--border);background:var(--card-bg);
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all 0.15s;
}
.back-btn:active{transform:scale(0.92);}
.dept-topbar-title{font-size:15px;font-weight:800;color:var(--accent);flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dept-shortage-btn{
    padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;
    border:1.5px solid #fca5a5;background:#fef2f2;color:#b91c1c;
    cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;
}
.dept-shortage-btn.ok{border-color:#86efac;background:#f0fdf4;color:#15803d;}
.dept-shortage-btn:active{opacity:0.8;}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4);}50%{box-shadow:0 0 0 6px rgba(239,68,68,0);}}
.dept-shortage-btn.has-shortage{animation:pulse-red 1.5s ease-in-out infinite;}

/* 3D 뷰 컨테이너 */
.map-view-container{
    margin:12px;background:var(--bg);
    border:1px solid var(--border);border-radius:12px;
    height:calc(100vh - 120px);
    display:flex;flex-direction:column;overflow:hidden;
}
.map-hint{
    font-size:11px;color:var(--muted);text-align:center;
    padding:6px;border-bottom:1px solid var(--border);
    background:var(--panel);flex-shrink:0;
}
.twin-3d-scene{
    flex:1;perspective:2500px;
    display:flex;justify-content:center;align-items:center;
    overflow:visible;cursor:grab;position:relative;
}
.twin-3d-scene:active{cursor:grabbing;}
.twin-3d-grid{
    display:grid;
    transform:translate(var(--tx),var(--ty)) rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(var(--rz)) scale(var(--zoom));
    transform-style:preserve-3d;transform-origin:center center;
    gap:10px;padding:32px;
    background:rgba(20,27,45,0.08);
    border:2px solid var(--border);border-radius:12px;
    transition:transform 0.01s linear;
    grid-auto-flow:row dense;
}
[data-theme="light"] .twin-3d-grid{background:rgba(255,255,255,0.9);}

/* 큐브 */
.cube3d-container{position:relative;transform-style:preserve-3d;}
.cube3d-box{position:absolute;width:100%;height:100%;transform-style:preserve-3d;transform:translateZ(0);transition:transform 0.15s ease;}
.cube3d-container[data-clickable="true"]:hover .cube3d-box{transform:translateZ(15px);cursor:pointer;}
.cube3d-box .face{position:absolute;box-sizing:border-box;border:1px solid rgba(255,255,255,0.22);}
.cube3d-box .top{width:100%;height:100%;top:0;left:0;transform:translateZ(var(--cube-h));position:relative;
    display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 12px rgba(255,255,255,0.15);}
.cube3d-box .top span{display:block;width:max-content;text-align:center;
    transform:rotateZ(calc(-1 * var(--rz))) rotateY(calc(-1 * var(--ry))) rotateX(calc(-1 * var(--rx)));
    font-size:13px;font-weight:bold;color:var(--text);white-space:nowrap;
    transform-origin:center center;transition:transform 0.01s linear;backface-visibility:visible;}
[data-theme="light"] .cube3d-box .face{border-color:rgba(0,0,0,0.08);}
.cube3d-box .front{width:100%;height:var(--cube-h);left:0;bottom:0;transform:rotateX(-90deg);transform-origin:bottom;}
.cube3d-box .back{width:100%;height:var(--cube-h);left:0;top:0;transform:rotateX(90deg);transform-origin:top;}
.cube3d-box .left{width:var(--cube-h);height:100%;left:0;top:0;transform:rotateY(-90deg);transform-origin:left;}
.cube3d-box .right{width:var(--cube-h);height:100%;right:0;top:0;transform:rotateY(90deg);transform-origin:right;}
.cube-shortage .top{background:rgba(239,68,68,0.55) !important;}
.cube-shortage .front,.cube-shortage .back{background:rgba(200,30,30,0.60) !important;}
.cube-shortage .left,.cube-shortage .right{background:rgba(170,20,20,0.65) !important;}
.cube-shortage .top span{color:#fff !important;}
.cell-3d-floor{background:transparent;border:none;min-width:0;height:0;}

/* ══ 스페어파트 모달 ══ */
#view-parts{
    display:none;position:fixed;inset:0;z-index:1000;
    background:var(--bg);flex-direction:column;
}
#view-parts.active-modal{display:flex;}
.parts-topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:var(--panel);
    border-bottom:1px solid var(--border);flex-shrink:0;
}
.parts-title{font-size:14px;font-weight:800;color:var(--accent);flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parts-search-bar{
    padding:8px 16px;background:var(--panel);
    border-bottom:1px solid var(--border);flex-shrink:0;
}
.parts-search-input{
    width:100%;padding:9px 16px;
    border:1.5px solid var(--border);border-radius:20px;
    background:var(--bg);color:var(--text);font-size:13px;outline:none;
}
.parts-search-input:focus{border-color:var(--accent);}
.parts-body{flex:1;overflow:auto;}
.part-table{width:100%;border-collapse:collapse;font-size:12px;}
.part-table th{
    position:sticky;top:0;background:var(--panel);
    padding:10px 8px;text-align:center;font-weight:700;
    border-bottom:2px solid var(--border);cursor:pointer;
    white-space:nowrap;color:var(--accent);font-size:11px;
}
.part-table td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--border);vertical-align:middle;}
.part-table tr:active td{background:rgba(56,189,248,0.06);}
.danger-row td{background:rgba(239,68,68,0.06);}
.danger-row td:first-child{border-left:3px solid var(--danger);}
.none-row td{opacity:0.45;}

/* ══ 요약 모달 ══ */
#view-summary{
    display:none;position:fixed;inset:0;z-index:1000;
    background:var(--bg);flex-direction:column;
}
#view-summary.active-modal{display:flex;}
.summary-table{width:100%;border-collapse:collapse;font-size:12px;}
.summary-table th{position:sticky;top:0;background:var(--panel);
    padding:10px 8px;text-align:center;font-weight:700;
    border-bottom:2px solid var(--border);cursor:pointer;
    color:var(--accent);font-size:11px;white-space:nowrap;}
.summary-table td{padding:9px 8px;border-bottom:1px solid var(--border);text-align:center;}

/* ══ 부서 재고부족 모달 ══ */
#dept-shortage-modal{
    display:none;position:fixed;inset:0;z-index:1100;
    background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
    align-items:flex-end;
}
#dept-shortage-modal.show{display:flex;}
.dept-shortage-box{
    width:100%;max-height:80vh;background:var(--panel);
    border-radius:20px 20px 0 0;display:flex;flex-direction:column;
    box-shadow:0 -8px 32px var(--shadow);
}
.dept-shortage-handle{
    width:40px;height:4px;background:var(--border);
    border-radius:2px;margin:12px auto 0;
}
.dept-shortage-head{
    display:flex;align-items:center;gap:10px;
    padding:12px 16px;border-bottom:1px solid var(--border);
}
.dept-shortage-head h3{margin:0;font-size:15px;color:var(--accent);flex:1;}
.close-btn{
    width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);
    background:var(--card-bg);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
}
.dept-shortage-body{flex:1;overflow:auto;padding:0;}

/* ══ 로딩 오버레이 ══ */
#loading-overlay{
    display:none;position:fixed;inset:0;z-index:9999;
    background:rgba(11,15,25,0.75);backdrop-filter:blur(4px);
    flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#loading-overlay.show{display:flex;}
.spinner-lg{
    width:52px;height:52px;border:5px solid rgba(56,189,248,0.15);
    border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-msg{color:#e2e8f0;font-size:15px;font-weight:600;margin:0;}

/* ══ 업로드 카드 ══ */
#view-upload{display:none;align-items:center;justify-content:center;min-height:80vh;}
.upload-card{
    background:var(--panel);border-radius:20px;padding:48px 32px;
    text-align:center;max-width:400px;width:calc(100% - 32px);
    box-shadow:0 16px 48px var(--shadow);border:2px dashed var(--accent);
}
.upload-card h2{margin:0 0 12px;font-size:20px;}

/* ══ PC 3D 뷰 개선 ══ */
@media(min-width:768px){
    header{height:60px;padding:0 24px;}
    .hd-logo{font-size:20px;}
    .search-wrap{padding:12px 24px;}
    #view-home{padding:20px 24px 32px;}
    .dept-grid{gap:16px;}
    .dept-card{padding:24px 16px;min-height:120px;}
    .dept-icon{font-size:36px;}
    .dept-name{font-size:15px;}
    .map-view-container{margin:16px;height:calc(100vh - 130px);}
    .part-table{font-size:13px;}
    .part-table th{padding:12px 12px;font-size:12px;}
    .part-table td{padding:10px 12px;}
}
</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
    <div class="spinner-lg"></div>
    <p id="loading-msg">Google Sheets에서 불러오는 중...</p>
</div>

<!-- 헤더 -->
<header>
    <div class="hd-left">
        <div>
            <div class="hd-logo">TaeguTec SPL</div>
            <div class="hd-sub">생산장비 Spare Part List</div>
        </div>
    </div>
    <div class="hd-right">
        <button class="icon-btn" onclick="toggleTheme()" title="테마">🌓</button>
        <button class="icon-btn" id="home-top-btn" onclick="goHome()" style="display:none" title="홈">🏠</button>
    </div>
</header>

<!-- 검색바 -->
<div class="search-wrap">
    <div class="search-inner">
        <input class="search-input" id="global-search" type="text"
            placeholder="🔍 부품명, 장비명 검색..."
            oninput="onGlobalSearch(this.value)"
            onblur="hideSearchDropdown()"
            onfocus="if(this.value.trim())onGlobalSearch(this.value)">
        <span class="search-icon">⌕</span>
        <div id="search-dropdown"></div>
    </div>
</div>

<!-- 업로드 실패 -->
<div id="view-upload" class="view">
    <div class="upload-card" id="drop-zone">
        <span style="font-size:48px;display:block;margin-bottom:16px">⚠️</span>
        <h2>데이터 로드 실패</h2>
        <p style="color:var(--accent);font-size:14px;margin-bottom:8px;">Google Sheets 연결에 실패했습니다.</p>
        <p style="color:var(--muted);font-size:12px;margin-bottom:24px;">인터넷 연결을 확인하거나 파일을 직접 선택하세요.</p>
        <button onclick="document.getElementById('file-loader').click()"
            style="padding:12px 28px;background:var(--primary);border:none;color:white;
                border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;">
            📂 파일 직접 선택
        </button>
        <input type="file" id="file-loader" accept=".xlsx" style="display:none">
    </div>
</div>

<!-- 홈 – 부서 카드 -->
<div id="view-home" class="view">
    <div class="home-header">
        <h2 class="home-title">🏭 공장 부서 현황</h2>
        <div class="home-actions">
            <span class="last-update" id="last-update-txt">Last Update: -</span>
            <button class="shortage-all-btn" onclick="openSummaryModal()">⚠️ 전체 재고부족</button>
        </div>
    </div>
    <div class="dept-grid" id="dept-grid"></div>
</div>

<!-- 부서 3D 뷰 -->
<div id="view-dept" class="view">
    <div class="dept-topbar">
        <button class="back-btn" onclick="goHome()">←</button>
        <span class="dept-topbar-title" id="lbl-dept-name">부서</span>
        <button class="dept-shortage-btn ok" id="dept-shortage-btn" onclick="openDeptShortageModal()">✅ 재고 정상</button>
    </div>
    <div id="equip-scroll-container" style="
        flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
        background:var(--bg);">
        <div id="dynamic-factory-map"></div>
    </div>
</div>

<!-- 스페어파트 전체화면 -->
<div id="view-parts">
    <div class="parts-topbar">
        <button class="back-btn" onclick="closePartsModal()">←</button>
        <span class="parts-title" id="lbl-parts-title">스페어파트</span>
    </div>
    <div class="parts-search-bar">
        <input class="parts-search-input" id="parts-search" type="text"
            placeholder="🔍 부품 검색..." oninput="filterPartsTable()">
    </div>
    <div class="parts-body">
        <div id="parts-data-zone"></div>
    </div>
</div>

<!-- 전체 재고부족 요약 -->
<div id="view-summary">
    <div class="parts-topbar">
        <button class="back-btn" onclick="closeSummaryModal()">←</button>
        <span class="parts-title">⚠️ 전체 청구 필요 자재</span>
    </div>
    <div class="parts-search-bar">
        <input class="parts-search-input" id="summary-search" type="text"
            placeholder="🔍 검색..." oninput="filterSummaryTable()">
    </div>
    <div class="parts-body">
        <div id="summary-data-zone"></div>
    </div>
</div>

<!-- 부서 재고부족 바텀시트 -->
<div id="dept-shortage-modal">
    <div class="dept-shortage-box">
        <div class="dept-shortage-handle"></div>
        <div class="dept-shortage-head">
            <h3 id="dept-shortage-title">⚠️ 청구 필요 자재</h3>
            <input style="flex:1;padding:6px 12px;border:1.5px solid var(--border);border-radius:16px;
                background:var(--bg);color:var(--text);font-size:12px;outline:none;margin:0 8px;"
                type="text" placeholder="검색..." id="dept-shortage-search" oninput="filterDeptShortageTable()">
            <button class="close-btn" onclick="closeDeptShortageModal()">✕</button>
        </div>
        <div class="dept-shortage-body">
            <div id="dept-shortage-zone"></div>
        </div>
    </div>

/* ══ 백그라운드 처리 ══
   모든 장비 시트를 4개씩 청크로 순회
   I열(idx=8)=현재재고, J열(idx=9)=안전재고 (고정 + 헤더 탐색 병행)
*/
function buildBackgroundData() {
    if(!excelWorkbook) return;
    globalShortageList = [];
    globalSearchIndex  = [];
    const shortageMap  = {};
    const SKIP = ['RawData','종합현황','HOME','Sheet1','Robot','전기','공통','Automation list','Automation List','Fanuc robot','Fanuc Robot','FANUC ROBOT'];
    const sheets = excelWorkbook.SheetNames.filter(n=>
        !SKIP.some(s=>n.toLowerCase()===s.toLowerCase())
    );
    let idx=0;

    function parseOneSheet(sName) {
        const sheet = excelWorkbook.Sheets[sName];
        if(!sheet||!sheet['!ref']) return;
        const matrix = XLSX.utils.sheet_to_json(sheet,{header:1});
        let hi=-1;
        // 진짜 헤더 행 = 컬럼 키워드를 '여러 개' 가진 행
        // (제목 행은 셀 하나에 'Part List' 같은 긴 문장만 있어서 제외됨)
        for(let i=0;i<Math.min(matrix.length,15);i++){
            const r=matrix[i];
            if(!r) continue;
            const cells = r.map(v=>String(v||'').trim().toLowerCase());
            let score=0;
            cells.forEach(c=>{
                if(c==='type') score++;
                if(c==='part') score++;
                if(c==='model') score++;
                if(c.replace(/ /g,'')==='itemno'||c.replace(/ /g,'')==='itemno.') score++;
                if(c.includes('description')) score++;
                if(c==='재고') score++;
                if(c.replace(/ /g,'')==='safetyqty') score++;
            });
            // 키워드 2개 이상이면 진짜 헤더 행
            if(score>=2){hi=i;break;}
        }
        if(hi<0) return;
        // Kobayashi 디버그

        const hdr = matrix[hi].map(h=>h?String(h).trim():'');
        const iiNo = hdr.findIndex(h=>{if(!h)return false;const c=h.toLowerCase().replace(/ /g,'').replace(/\.$/,'');return c=='itemno';});
        const iType= hdr.findIndex(h=>h&&h==='Type');
        const iDesc= hdr.findIndex(h=>h&&(h.toLowerCase().includes('desc')||h==='Part Name'));
        // 재고 컬럼: '재고' 또는 '현재 재고' (Safety 글자 없는 순수 재고)
        let iStk = hdr.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase();return (t==='재고'||t==='현재 재고'||t==='현재재고'||tl==='stock'||tl==='qty')&&!tl.includes('safety');});
        // 안전재고 컬럼: 'Safety'(짧은형) 또는 'Safety Qty' 또는 '안전'
        let iSfy = hdr.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase().replace(/ /g,'');return tl==='safety'||tl==='safetyqty'||tl==='safetystock'||t==='안전 재고'||t==='안전재고'||t.includes('안전');});
        // Safety Qty 헤더가 없는 시트는 처리하지 않음
        if(iSfy<0) return;
        // 재고 컬럼도 없으면 고정 인덱스 폴백
        if(iStk<0) iStk=iSfy-1;

        let cnt=0;
        matrix.slice(hi+1).forEach(row=>{
            if(!row||!row.join('')) return;
            const itemNo= iiNo>=0?String(row[iiNo]||'').trim():'';
            const type  = iType>=0?String(row[iType]||'').trim():'';
            const desc  = iDesc>=0?String(row[iDesc]||'').trim():'';
            if(!itemNo&&!type&&!desc) return;
            // 재고: RawData 캐시 우선 (0도 유효한 값)
            const stk = (itemNo && itemNo!=='' && globalStockCache[itemNo] !== undefined)
                ? globalStockCache[itemNo]
                : (row[iStk] !== undefined ? row[iStk] : 0);
            // Safety Qty: iSfy 위치가 비어있으면 인접 열(+1, +2)도 탐색
            // Safety Qty: 해당 열이 비어있으면 +1열만 허용 (병합셀 대응)
            const sfyRaw = row[iSfy];
            const sfy=parseFloat(String(sfyRaw||'').replace(/,/g,''));
            // stk: 0도 유효한 재고값
            const ns = (stk===0||stk==='0') ? 0 : parseFloat(String(stk||'').replace(/,/g,''));
            const shortage=!isNaN(ns)&&!isNaN(sfy)&&sfy>0&&ns<sfy;
            if(sName==='Kobayashi'&&shortage) console.log('[KOB부족]',itemNo,'stk=',stk,'ns=',ns,'sfy=',sfy);
            if(sName==='Kobayashi'&&itemNo==='950112'){
                console.log('[KOB950112] 전체row:', JSON.stringify(row));
                console.log('[KOB950112] iStk=',iStk,'iSfy=',iSfy,'stk=',stk,'sfyRaw=',sfyRaw,'sfy=',sfy,'ns=',ns);
            }

            globalSearchIndex.push({sheet:sName,itemNo,type,desc,stock:stk,shortage,
                display:[sName,itemNo,type,desc,...row.slice(0,12).map(v=>String(v||''))].join(' ')});
            if(shortage){
                cnt++;
                globalShortageList.push({sheetName:sName, row, hdr, iStk, stk});
            }
        });
        if(cnt>0) shortageMap[sName]=cnt;
    }

    function processChunk() {
        sheets.slice(idx,idx+4).forEach(parseOneSheet);
        idx+=4;
        if(idx<sheets.length){ setTimeout(processChunk,10); }
        else {
            console.log('[SPL] 완료:',sheets.length,'시트,',globalShortageList.length,'부족항목, shortageMap:', JSON.stringify(shortageMap));
            updateSVGBadges(shortageMap);
        }
    }
    processChunk();
}

/* ══ SVG 뱃지 업데이트 ══ */
const DEPT_BADGE = {
    'IMC ENDMILL':'IMC-ENDMILL','원료':'원료','MC':'MC','금형1':'금형1',
    '합금1':'합금1','드릴':'드릴','세라믹':'세라믹','코팅2':'코팅2',
    'QA':'QA','연삭2':'연삭2','금형2':'금형2','합금2':'합금2',
    'Roll':'Roll','연삭1':'연삭1','코팅1':'코팅1','가공':'가공'
};

function updateSVGBadges(shortageMap) {
    if(!excelWorkbook) return;
    // 부서 카드 배지 업데이트
    Object.keys(DEPT_BADGE).forEach(deptName=>{
        const sName = deptName==='M/C'?'MC':deptName;
        const sheet = excelWorkbook.Sheets[sName];
        if(!sheet||!sheet['!ref']) return;
        const range = XLSX.utils.decode_range(sheet['!ref']);
        const links = new Set();
        for(let r=0;r<=range.e.r;r++){
            for(let c=26;c<=Math.min(range.e.c,51);c++){
                const cell=sheet[XLSX.utils.encode_cell({r,c})];
                if(!cell||!cell.v) continue;
                let lk=String(cell.v).trim();
                const mapped = HYPERLINK_MAP[lk];
                if(mapped) lk=mapped;
                else if(cell.l&&cell.l.Target){
                    const raw=String(cell.l.Target);
                    if(raw.startsWith('#')) lk=raw.substring(1).split('!')[0].replace(/^'|'$/g,'').trim();
                }
                links.add(lk);
            }
        }
        let total=0;
        links.forEach(lk=>{
            const lLow=lk.toLowerCase().replace(/\s/g,'');
            Object.entries(shortageMap).forEach(([src,cnt])=>{
                const sLow=src.toLowerCase().replace(/\s/g,'');
                if(lLow===sLow||lLow.includes(sLow)||sLow.includes(lLow)) total+=cnt;
            });
        });
        // 카드 배지 업데이트
        const card=document.querySelector(`.dept-card[data-dept="${deptName}"]`);
        if(!card) return;
        const badge=card.querySelector('.dept-badge');
        if(total>0){
            card.classList.add('has-shortage');
            if(badge){badge.textContent=total>99?'99+':String(total);badge.style.display='';}
        } else {
            card.classList.remove('has-shortage');
            if(badge) badge.style.display='none';
        }
    });
}

function toggleTheme(){

/* ══ 3D 궤도 ══ */
function setup3DOrbit(){
    if(orbitAbortController) orbitAbortController.abort();
    orbitAbortController=new AbortController();
    const {signal}=orbitAbortController;
    const stage=document.getElementById('3d-scene-stage');
    const grid=document.getElementById('dynamic-factory-map');

    // 마우스 (PC)
    stage.addEventListener('mousedown',e=>{
        if(e.button===1){e.preventDefault();isRotating=true;}
        else if(e.button===0){isPanning=true;}
        prevMouseX=e.clientX;prevMouseY=e.clientY;
    },{signal});
    window.addEventListener('mousemove',e=>{
        if(!isPanning&&!isRotating) return;
        const dx=e.clientX-prevMouseX, dy=e.clientY-prevMouseY;
        if(isRotating){
            if(e.shiftKey){currentRy+=dx*0.35;}
            else{currentRz+=dx*0.35;currentRx-=dy*0.35;}
            grid.style.setProperty('--rx',currentRx+'deg');
            grid.style.setProperty('--ry',currentRy+'deg');
            grid.style.setProperty('--rz',currentRz+'deg');
        } else {
            currentTx+=dx*0.85;currentTy+=dy*0.85;
            grid.style.setProperty('--tx',currentTx+'px');
            grid.style.setProperty('--ty',currentTy+'px');
        }
        prevMouseX=e.clientX;prevMouseY=e.clientY;
        syncBillboard();
    },{signal});
    window.addEventListener('mouseup',()=>{isPanning=false;isRotating=false;},{signal});
    stage.addEventListener('wheel',e=>{
        e.preventDefault();
        currentZoom=Math.min(3,Math.max(0.2,currentZoom+(e.deltaY<0?0.05:-0.05)));
        grid.style.setProperty('--zoom',currentZoom);
    },{passive:false,signal});

    // 터치 (모바일)
    let pinchDist0=null, touchRot=false;
    function getTouchDist(t1,t2){
        return Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    }
    stage.addEventListener('touchstart',e=>{
        e.preventDefault();
        const ts=e.touches;
        if(ts.length===1){
            isPanning=true; isRotating=false; touchRot=false;
            prevMouseX=ts[0].clientX; prevMouseY=ts[0].clientY;
        } else if(ts.length===2){
            isPanning=false;
            pinchDist0=getTouchDist(ts[0],ts[1]);
            touchRot=true;
            prevMouseX=(ts[0].clientX+ts[1].clientX)/2;
            prevMouseY=(ts[0].clientY+ts[1].clientY)/2;
        }
    },{passive:false,signal});
    stage.addEventListener('touchmove',e=>{
        e.preventDefault();
        const ts=e.touches;
        if(ts.length===1 && isPanning){
            const dx=ts[0].clientX-prevMouseX, dy=ts[0].clientY-prevMouseY;
            currentTx+=dx; currentTy+=dy;
            grid.style.setProperty('--tx',currentTx+'px');
            grid.style.setProperty('--ty',currentTy+'px');
            prevMouseX=ts[0].clientX; prevMouseY=ts[0].clientY;
        } else if(ts.length===2 && touchRot){
            const d=getTouchDist(ts[0],ts[1]);
            if(pinchDist0){
                const ratio=d/pinchDist0;
                currentZoom=Math.min(3,Math.max(0.2,currentZoom*ratio));
                grid.style.setProperty('--zoom',currentZoom);
                pinchDist0=d;
            }
            const mx=(ts[0].clientX+ts[1].clientX)/2;
            const my=(ts[0].clientY+ts[1].clientY)/2;
            const dx=mx-prevMouseX, dy=my-prevMouseY;
            currentRz+=dx*0.4; currentRx-=dy*0.4;
            grid.style.setProperty('--rx',currentRx+'deg');
            grid.style.setProperty('--rz',currentRz+'deg');
            prevMouseX=mx; prevMouseY=my;
        }
        syncBillboard();
    },{passive:false,signal});
    stage.addEventListener('touchend',e=>{
        if(e.touches.length===0){isPanning=false;touchRot=false;pinchDist0=null;}
    },{signal});
}
function syncBillboard(){
    document.querySelectorAll('.cube3d-box .top span').forEach(el=>{
        el.style.transform=`rotateZ(calc(-1 * var(--rz))) rotateY(calc(-1 * var(--ry))) rotateX(calc(-1 * var(--rx)))`;
    });
}
function resetCam(){
    currentRx=currentRy=currentRz=currentTx=currentTy=0;currentZoom=0.95;
    const g=document.getElementById('dynamic-factory-map');
    if(!g) return;
    ['--rx','--ry','--rz'].forEach(p=>g.style.setProperty(p,'0deg'));
    ['--tx','--ty'].forEach(p=>g.style.setProperty(p,'0px'));
    g.style.setProperty('--zoom','0.95');
}
function autoFitZoom(){
    const stage=document.getElementById('3d-scene-stage');
    const grid =document.getElementById('dynamic-factory-map');
    if(!stage||!grid) return;
    const availW=stage.clientWidth -80;
    const availH=stage.clientHeight-80;
    const gridW =grid.scrollWidth;
    const gridH =grid.scrollHeight;
    if(!gridW||!gridH||availW<=0||availH<=0) return;
    const fit=Math.min(availW/gridW, availH/gridH);
    currentZoom=Math.max(0.15, Math.min(fit*0.88, 1.5));
    grid.style.setProperty('--zoom', currentZoom);
}

/* ══ 유틸 ══ */
function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function getDynamicCubeColors(name){
    let raw=String(name).trim().toUpperCase();
    const xsMatch=raw.match(/^(6[012]\d)XS/);
    if(xsMatch){
        const h={'628':30,'620':195,'629':140}[xsMatch[1]]??200;
        return{top:`hsla(${h},80%,62%,0.50)`,front:`hsla(${h},70%,48%,0.58)`,left:`hsla(${h},65%,40%,0.58)`};
    }
    let p=raw.split(/[#\d\s\-]/)[0]||raw;
    const map={OKANO:160,COMBI:135,CENTRO:195,QUATTRO:95,AP460:280,GIG:20,APX:220,NICOLIS:320,FUJI:50,ANCA:260,PUMA:340};
    const f=Object.keys(map).find(k=>p.includes(k));
    let hue=0;
    if(f){hue=map[f];}else{let h=0;for(let i=0;i<p.length;i++)h=p.charCodeAt(i)+((h<<5)-h);hue=Math.abs(h)%360;}
    return{top:`hsla(${hue},85%,60%,0.45)`,front:`hsla(${hue},75%,45%,0.55)`,left:`hsla(${hue},70%,40%,0.55)`};
}

/* ══ 시트명 탐색 ══ */
function findSheet(key){
    if(!excelWorkbook||!key) return null;
    const names=excelWorkbook.SheetNames;
    const clean=s=>String(s).trim().toLowerCase().replace(/[\s#]/g,'');
    // 1. 완전일치
    let r=names.find(n=>n===key); if(r) return r;
    // 2. 정규화 일치
    r=names.find(n=>clean(n)===clean(key)); if(r) return r;
    // 3. 포함
    r=names.find(n=>clean(n).includes(clean(key))||clean(key).includes(clean(n))); if(r) return r;
    return null;
}

/* ══ 2D 장비 카드 렌더링 ══ */
function render2DMap(sheet){
    const mapZone=document.getElementById('dynamic-factory-map');
    mapZone.innerHTML='';
    mapZone.style.gridTemplateColumns='';
    mapZone.style.gap='';

    const range=XLSX.utils.decode_range(sheet['!ref']);
    const maxR=range.e.r, maxC=Math.min(range.e.c,51);
    const mapStartCol=26;
    if(mapStartCol>maxC){
        mapZone.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px;">배치 데이터 없음</p>';
        return;
    }

    // 셀 데이터 수집
    const items=[]; // {val, linkSheet, isHeader}
    const ROOM_KW=['Press','Sinter','Sand','합금','금형','연삭','코팅','가공','구역','M/C','Robot','QA','IMC'];
    const isRoomHeader=val=>ROOM_KW.some(k=>val===k||(val.startsWith(k)&&/^[\s\d_\-\/]*$/.test(val.slice(k.length))));

    // 병합셀 처리
    const merged={};
    if(sheet['!merges']){
        sheet['!merges'].forEach(m=>{
            const oc=sheet[XLSX.utils.encode_cell({r:m.s.r,c:m.s.c})];
            const txt=oc?String(oc.v??'').trim():'';
            if(txt) merged[`${m.s.r}_${m.s.c}`]={txt, er:m.e.r, ec:m.e.c};
            for(let r=m.s.r;r<=m.e.r;r++)
                for(let c=m.s.c;c<=m.e.c;c++)
                    if(!(r===m.s.r&&c===m.s.c)) merged[`${r}_${c}`]={skip:true};
        });
    }

    const seen=new Set();
    for(let r=0;r<=maxR;r++){
        for(let c=mapStartCol;c<=maxC;c++){
            const mk=`${r}_${c}`;
            if(merged[mk]?.skip) continue;
            const val=merged[mk]?.txt||(sheet[XLSX.utils.encode_cell({r,c})]?String(sheet[XLSX.utils.encode_cell({r,c})].v??'').trim():'');
            if(!val) continue;
            if(seen.has(val)) continue;
            seen.add(val);
            const linkSheet=HYPERLINK_MAP[val]||val;
            items.push({val, linkSheet, isHeader:isRoomHeader(val)});
        }
    }

    if(!items.length){
        mapZone.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px;">장비 데이터 없음</p>';
        return;
    }

    // 2D 카드 렌더링
    const HPAL=[
        {bg:'rgba(219,234,254,0.8)',border:'#93c5fd',txt:'#1d4ed8'},
        {bg:'rgba(254,215,170,0.8)',border:'#fdba74',txt:'#c2410c'},
        {bg:'rgba(187,247,208,0.8)',border:'#86efac',txt:'#15803d'},
        {bg:'rgba(233,213,255,0.8)',border:'#d8b4fe',txt:'#7e22ce'},
        {bg:'rgba(207,250,254,0.8)',border:'#67e8f9',txt:'#0e7490'},
        {bg:'rgba(254,249,195,0.8)',border:'#fcd34d',txt:'#b45309'},
        {bg:'rgba(254,202,202,0.8)',border:'#fca5a5',txt:'#b91c1c'},
        {bg:'rgba(209,250,229,0.8)',border:'#6ee7b7',txt:'#065f46'},
    ];
    let palIdx=0;
    let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;padding:12px;">';
    items.forEach(({val,linkSheet,isHeader})=>{
        if(isHeader){
            const p=HPAL[palIdx++%HPAL.length];
            html+=`<div style="grid-column:1/-1;padding:8px 14px;
                background:${p.bg};border:2px solid ${p.border};border-radius:10px;
                font-size:13px;font-weight:900;color:${p.txt};letter-spacing:1px;">
                ${escapeHtml(val)}</div>`;
        } else {
            const colors=getDynamicCubeColors(val);
            html+=`<div class="equip-card" data-val="${escapeHtml(val)}" data-sheet="${escapeHtml(linkSheet)}"
                style="background:${colors.top};border:2px solid ${colors.front};border-radius:12px;
                padding:14px 8px;text-align:center;cursor:pointer;
                font-size:12px;font-weight:700;color:var(--text);
                transition:transform 0.12s,box-shadow 0.12s;
                box-shadow:0 2px 6px rgba(0,0,0,0.1);
                word-break:break-word;line-height:1.3;
                -webkit-tap-highlight-color:transparent;">
                ${escapeHtml(val)}</div>`;
        }
    });
    html+='</div>';
    mapZone.innerHTML=html;

    // 클릭 이벤트
    if(mapZone._cardClickHandler) mapZone.removeEventListener('click',mapZone._cardClickHandler);
    mapZone._cardClickHandler=e=>{
        const card=e.target.closest('.equip-card');
        if(card){
            openPartsModal(card.getAttribute('data-val'), card.getAttribute('data-sheet'));
        }
    };
    mapZone.addEventListener('click',mapZone._cardClickHandler);

    // 터치 피드백
    mapZone.addEventListener('touchstart',e=>{
        const card=e.target.closest('.equip-card');
        if(card) card.style.transform='scale(0.94)';
    },{passive:true});
    mapZone.addEventListener('touchend',e=>{
        const card=e.target.closest('.equip-card');
        if(card) setTimeout(()=>{card.style.transform='';},150);
    },{passive:true});
}

/* ══ 3D 맵 렌더링 ══ */
function render3DMap(sheet, mapStartCol){
    const mapZone=document.getElementById('dynamic-factory-map');
    mapZone.innerHTML='';
    const range=XLSX.utils.decode_range(sheet['!ref']);
    const maxR=range.e.r, maxC=Math.min(range.e.c,51);
    if(mapStartCol>maxC){mapZone.innerHTML='<p style="color:#64748b;text-align:center;padding:20px;">배치 데이터 없음</p>';return;}
    const DEF=8.43, NARROW=2.5;
    const cw={};
    if(sheet['!cols']) sheet['!cols'].forEach((c,i)=>{cw[i]=c?.wch??DEF;});
    const wch=c=>cw[c]??DEF;
    const isTunnel=c=>wch(c)<NARROW;
    const usedCols=[];
    for(let c=mapStartCol;c<=maxC;c++) if(!isTunnel(c)) usedCols.push(c);
    if(!usedCols.length) return;

    const grid={};
    for(let r=0;r<=maxR;r++){grid[r]={};for(let c=mapStartCol;c<=maxC;c++) grid[r][c]={cell:sheet[XLSX.utils.encode_cell({r,c})],isMerged:false,rowspan:1,colspan:1,text:''};}
    if(sheet['!merges']){
        sheet['!merges'].forEach(m=>{
            if(m.e.c<mapStartCol||m.s.c>maxC||m.s.r>maxR) return;
            const sR=Math.max(m.s.r,0),eR=Math.min(m.e.r,maxR);
            const sC=Math.max(m.s.c,mapStartCol),eC=Math.min(m.e.c,maxC);
            const oc=sheet[XLSX.utils.encode_cell({r:m.s.r,c:m.s.c})];
            const txt=oc?String(oc.v??'').trim():'';
            if(grid[sR]?.[sC]){grid[sR][sC].rowspan=eR-sR+1;grid[sR][sC].colspan=eC-sC+1;grid[sR][sC].text=txt;}
            for(let r=sR;r<=eR;r++) for(let c=sC;c<=eC;c++){if(r===sR&&c===sC)continue;if(grid[r]?.[c])grid[r][c].isMerged=true;}
        });
    }
    const usedRows=[];
    for(let r=0;r<=maxR;r++){let has=false;for(const c of usedCols)if(grid[r]?.[c]?.cell?.v||grid[r]?.[c]?.text){has=true;break;}if(has)usedRows.push(r);}
    if(!usedRows.length) return;

    const COL_SCALE=10,COL_MIN=72,ROW_H=52;
    const colPx={};
    usedCols.forEach(c=>{colPx[c]=Math.max(COL_MIN,wch(c)*COL_SCALE);});
    mapZone.style.gridTemplateColumns=usedCols.map(c=>colPx[c]+'px').join(' ');
    mapZone.style.gap='8px'; mapZone.style.gridAutoFlow='row';

    const calcSpan=(sC,raw)=>{let s=0;for(let ci=sC;ci<sC+raw&&ci<=maxC;ci++)if(!isTunnel(ci))s++;return Math.max(1,s);};

    const ROOM_KW=['Press','Sinter','Sand','합금','금형','연삭','코팅','가공','구역','M/C','Robot','QA','IMC'];
    const isRoomHeader=val=>ROOM_KW.some(k=>{
        if(val===k) return true;
        if(val.startsWith(k)&&/^[\s\d_\-\/]*$/.test(val.slice(k.length))) return true;
        return false;
    });
    const HPAL=[
        {bg:'rgba(219,234,254,0.7)',border:'#93c5fd',txt:'#1d4ed8'},
        {bg:'rgba(254,215,170,0.7)',border:'#fdba74',txt:'#c2410c'},
        {bg:'rgba(187,247,208,0.7)',border:'#86efac',txt:'#15803d'},
        {bg:'rgba(233,213,255,0.7)',border:'#d8b4fe',txt:'#7e22ce'},
        {bg:'rgba(207,250,254,0.7)',border:'#67e8f9',txt:'#0e7490'},
        {bg:'rgba(254,249,195,0.7)',border:'#fcd34d',txt:'#b45309'},
        {bg:'rgba(254,202,202,0.7)',border:'#fca5a5',txt:'#b91c1c'},
        {bg:'rgba(209,250,229,0.7)',border:'#6ee7b7',txt:'#065f46'},
    ];
    let palIdx=0;
    const headerRowPal={};
    for(const r of usedRows){
        for(const c of usedCols){
            const gc=grid[r]?.[c];if(!gc||gc.isMerged)continue;
            const val=gc.text||(gc.cell?String(gc.cell.v??'').trim():'');
            if(val&&isRoomHeader(val)){if(!(r in headerRowPal))headerRowPal[r]=HPAL[palIdx++%HPAL.length];break;}
        }
    }

    const frags=[];
    for(const r of usedRows){
        const isHRow=r in headerRowPal;
        for(const c of usedCols){
            const gc=grid[r]?.[c];if(!gc||gc.isMerged)continue;
            const cs=calcSpan(c,gc.colspan);
            let rs=0;for(let ri=r;ri<r+gc.rowspan&&ri<=maxR;ri++)if(usedRows.includes(ri))rs++;if(rs<1)rs=1;
            const spanSt=`grid-column:span ${cs};grid-row:span ${rs};height:${rs*ROW_H}px;`;
            const val=gc.text||(gc.cell?String(gc.cell.v??'').trim():'');
            if(!val){frags.push(`<div style="${spanSt}background:transparent;"></div>`);continue;}
            if(isRoomHeader(val)&&isHRow){
                const p=headerRowPal[r];
                frags.push(`<div style="${spanSt}display:flex;align-items:center;justify-content:center;background:${p.bg};border:2px solid ${p.border};border-radius:8px;box-sizing:border-box;"><span style="font-size:13px;font-weight:900;letter-spacing:2px;color:${p.txt};text-transform:uppercase;">${escapeHtml(val)}</span></div>`);
                continue;
            }
            // 링크 타겟 추출 (HYPERLINK_MAP 우선)
            let linkSheet = HYPERLINK_MAP[val] || val;
            if(gc.cell?.l?.Target){const raw=String(gc.cell.l.Target);if(raw.startsWith('#'))linkSheet=raw.substring(1).split('!')[0].replace(/^'|'$/g,'').trim();}
            if(!HYPERLINK_MAP[val] && !gc.cell?.l?.Target) linkSheet = val;
            const t=getDynamicCubeColors(val);
            frags.push(`<div class="cube3d-container" data-clickable="true" data-val="${escapeHtml(val)}" data-sheet="${escapeHtml(linkSheet)}" style="${spanSt}--top-color:${t.top};--front-color:${t.front};--left-color:${t.left};"><div class="cube3d-box"><div class="face top" style="background:var(--top-color);"><span>${escapeHtml(val)}</span></div><div class="face front"></div><div class="face back"></div><div class="face left"></div><div class="face right"></div></div></div>`);
        }
    }
    mapZone.innerHTML=frags.join('');
    if(mapZone._cubeClickHandler) mapZone.removeEventListener('click', mapZone._cubeClickHandler);
    mapZone._cubeClickHandler = e=>{
        const cube=e.target.closest('.cube3d-container[data-clickable="true"]');
        if(cube) openPartsModal(cube.getAttribute('data-val'), cube.getAttribute('data-sheet'));
    };
    mapZone.addEventListener('click', mapZone._cubeClickHandler);
}

/* ══ 재고부족 큐브 강조 ══ */
function markShortageCubes(){
    if(!globalShortageList.length) return;
    const shortageSheets=new Set(globalShortageList.map(i=>i.sheetName.toLowerCase().replace(/\s/g,'')));
    document.querySelectorAll('.cube3d-container[data-sheet]').forEach(cube=>{
        const sh=cube.getAttribute('data-sheet').toLowerCase().replace(/\s/g,'');
        cube.classList.toggle('cube-shortage', shortageSheets.has(sh));
    });
}

/* ══ 부서 청구필요자재 버튼 ══ */
function updateDeptShortageBtn(){
    const btn=document.getElementById('dept-shortage-btn');
    if(!btn) return;
    // 현재 배치도 큐브 data-sheet 수집
    const linkedSheets=new Set();
    document.querySelectorAll('#dynamic-factory-map .cube3d-container[data-sheet]').forEach(cube=>{
        const sh=cube.getAttribute('data-sheet'); if(sh) linkedSheets.add(sh.trim());
    });
    // globalShortageList에서 linkedSheets 매칭
    const count=globalShortageList.filter(item=>{
        const sLow=item.sheetName.toLowerCase().replace(/\s/g,'');
        return [...linkedSheets].some(sh=>{ const lLow=sh.toLowerCase().replace(/\s/g,''); return lLow===sLow||lLow.includes(sLow)||sLow.includes(lLow); });
    }).length;

    if(count>0){
        btn.textContent=`⚠️ 청구 필요 자재 (${count}건)`;
        btn.style.cssText='padding:6px 16px;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid #f5c6cb;background:#f8d7da;color:#721c24;margin-left:auto;';
        btn.classList.add('has-shortage');
    } else {
        btn.textContent='✅ 청구 필요 자재 없음';
        btn.style.cssText='padding:6px 16px;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid #86efac;background:#f0fdf4;color:#15803d;margin-left:auto;';
        btn.classList.remove('has-shortage');
    }
}

/* ══ 메인 청구필요자재 (전체) ══ */
function openSummaryModal(){
    if(!excelWorkbook) return;
    document.getElementById('summary-search').value='';
    currentSortDirection={};
    const zone=document.getElementById('summary-data-zone');

    if(!globalShortageList.length){
        zone.innerHTML=`<div style="padding:40px;text-align:center;color:#15803d;font-size:15px;font-weight:bold;">✅ 청구 필요 자재가 없습니다.<br><span style="font-size:12px;color:var(--text-muted);margin-top:8px;display:block;">백그라운드 로딩 중이면 잠시 후 다시 시도해주세요.</span></div>`;
        showView('summary');
        return;
    }

    // 헤더: 출처 시트 + 첫 항목의 헤더
    const firstHdr=globalShortageList[0].hdr;
    const hideIdx=firstHdr.reduce((a,h,i)=>{const c=(h||'').toLowerCase().replace(/ /g,'');if(c==='vendor'||c==='벤더'||c.includes('사진')||c==='k')a.push(i);return a;},[]);
    const visMap=[];
    firstHdr.forEach((h,i)=>{if(!hideIdx.includes(i)) visMap.push(i);});

    let html=`<table class="summary-table"><thead><tr>`;
    html+=`<th style="text-align:left;padding-left:20px">출처 시트</th>`;
    visMap.forEach((ci,vi)=>{
        const h=firstHdr[ci]||'';
        const left=['desc','part','model','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
        html+=`<th style="text-align:${left?'left;padding-left:20px':'center'}" onclick="executeSummarySort(${vi+1})">${escapeHtml(h)}</th>`;
    });
    html+=`</tr></thead><tbody>`;

    globalShortageList.forEach(({sheetName,row,hdr,iStk,stk})=>{
        html+=`<tr class="danger-row" data-clickable="true" data-sheet="${escapeHtml(sheetName)}">`;
        html+=`<td style="text-align:left;padding-left:20px;font-weight:700;color:var(--accent-glow);">${escapeHtml(sheetName)}</td>`;
        visMap.forEach(ci=>{
            const h=hdr[ci]||firstHdr[ci]||'';
            const left=['desc','part','model','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
            const v=ci===iStk?stk:(row[ci]!==undefined?row[ci]:'');
            html+=`<td style="text-align:${left?'left;padding-left:20px':'center'}">${escapeHtml(String(v))}</td>`;
        });
        html+=`</tr>`;
    });
    html+=`</tbody></table>`;
    zone.innerHTML=html;

    document.querySelectorAll('#summary-data-zone tr[data-clickable="true"]').forEach(row=>{
        row.addEventListener('click',()=>{
            const sh=row.getAttribute('data-sheet');
            if(sh) openPartsModal(sh,sh);
        });
    });
    showView('summary');
}

/* ══ 부서 청구필요자재 팝업 ══ */
function openDeptShortageModal(){
    if(!excelWorkbook||!currentDeptName) return;
    document.getElementById('lbl-dept-shortage-title').innerText=`⚠️ ${currentDeptName} – 청구 필요 자재`;
    document.getElementById('dept-shortage-search').value='';
    const zone=document.getElementById('dept-shortage-zone');

    // 현재 배치도 큐브 data-sheet 수집
    const linkedSheets=new Set();
    document.querySelectorAll('#dynamic-factory-map .cube3d-container[data-sheet]').forEach(cube=>{
        const sh=cube.getAttribute('data-sheet'); if(sh) linkedSheets.add(sh.trim());
    });

    // globalShortageList 필터
    const rows=globalShortageList.filter(item=>{
        const sLow=item.sheetName.toLowerCase().replace(/\s/g,'');
        return [...linkedSheets].some(sh=>{ const lLow=sh.toLowerCase().replace(/\s/g,''); return lLow===sLow||lLow.includes(sLow)||sLow.includes(lLow); });
    });

    if(!rows.length){
        zone.innerHTML=`<div style="padding:40px;text-align:center;color:#15803d;font-size:16px;font-weight:bold;">✅ 청구 필요 자재가 없습니다.</div>`;
        document.getElementById('dept-shortage-modal').classList.add('show');
        return;
    }

    const firstHdr=rows[0].hdr;
    const hideIdx=firstHdr.reduce((a,h,i)=>{const c=(h||'').toLowerCase().replace(/ /g,'');if(c==='vendor'||c==='벤더'||c.includes('사진')||c==='k')a.push(i);return a;},[]);
    const visMap=[];
    firstHdr.forEach((h,i)=>{if(!hideIdx.includes(i)) visMap.push(i);});

    let html=`<table class="part-table"><thead><tr>`;
    html+=`<th style="text-align:left;padding-left:20px">장비</th>`;
    visMap.forEach((ci,vi)=>{
        const h=firstHdr[ci]||'';
        const left=['desc','part','model','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
        html+=`<th style="text-align:${left?'left;padding-left:20px':'center'}" onclick="executeDeptShortageSort(${vi+1})">${escapeHtml(h)}</th>`;
    });
    html+=`</tr></thead><tbody>`;

    rows.forEach(({sheetName,row,hdr,iStk,stk})=>{
        html+=`<tr class="danger-row">`;
        html+=`<td style="text-align:left;padding-left:20px;font-weight:700;color:var(--accent-glow);">${escapeHtml(sheetName)}</td>`;
        visMap.forEach(ci=>{
            const h=hdr[ci]||firstHdr[ci]||'';
            const left=['desc','part','model','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
            const v=ci===iStk?stk:(row[ci]!==undefined?row[ci]:'');
            html+=`<td style="text-align:${left?'left;padding-left:20px':'center'}">${escapeHtml(String(v))}</td>`;
        });
        html+=`</tr>`;
    });
    html+=`</tbody></table>`;
    zone.innerHTML=html;
    document.getElementById('dept-shortage-modal').classList.add('show');
}
function closeDeptShortageModal(e){ document.getElementById('dept-shortage-modal').classList.remove('show'); }
function filterDeptShortageTable(){
    const q=document.getElementById('dept-shortage-search').value.toLowerCase().trim();
    document.querySelectorAll('#dept-shortage-zone tbody tr').forEach(r=>{r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';});
}
let deptShortageSortDir={};
function executeDeptShortageSort(ci){
    const tbl=document.querySelector('#dept-shortage-zone .part-table');if(!tbl)return;
    const tbody=tbl.querySelector('tbody');
    const dir=deptShortageSortDir[ci]==='desc'?'asc':'desc'; deptShortageSortDir[ci]=dir;
    const rows=Array.from(tbody.querySelectorAll('tr'));
    rows.sort((a,b)=>{const ca=a.cells[ci]?.innerText.trim()??'',cb=b.cells[ci]?.innerText.trim()??'';const na=parseFloat(ca.replace(/,/g,'')),nb=parseFloat(cb.replace(/,/g,''));if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;return dir==='asc'?ca.localeCompare(cb,'ko'):cb.localeCompare(ca,'ko');});
    rows.forEach(r=>tbody.appendChild(r));
    tbl.querySelectorAll('th').forEach((th,i)=>{th.innerText=th.innerText.replace(/ [↑↓]$/g,'');if(i===ci)th.innerText+=dir==='asc'?' ↑':' ↓';});
}

/* ══ 스페어파트 팝업 ══ */
function openPartsModal(displayKey, targetSheetName){
    document.getElementById('parts-search').value='';
    currentSortDirection={};
    const actualSheet=findSheet(targetSheetName||displayKey)||(targetSheetName?findSheet(displayKey):null);
    const zone=document.getElementById('parts-data-zone');
    document.getElementById('lbl-parts-title').innerText=`⚙️ 장비 [ ${displayKey} ] 스페어파트 내역`;

    if(!actualSheet){
        zone.innerHTML=`<div style="padding:40px;text-align:center;color:#ef4444;font-weight:bold;">연동 오류: [${escapeHtml(targetSheetName||displayKey)}] 시트 없음</div>`;
        showView('parts'); return;
    }
    const sheet=excelWorkbook.Sheets[actualSheet];
    const matrix=XLSX.utils.sheet_to_json(sheet,{header:1});
    if(!matrix.length){zone.innerHTML=`<p style="text-align:center;color:#888;padding:30px;">데이터 없음</p>`;showView('parts');return;}

    let hi=0;
    for(let i=0;i<Math.min(matrix.length,15);i++){
        const r=matrix[i];if(!r)continue;
        const cells=r.map(v=>String(v||'').trim().toLowerCase());
        let score=0;
        cells.forEach(c=>{
            if(c==='type')score++;if(c==='part')score++;if(c==='model')score++;
            if(c.replace(/ /g,'').replace(/\.$/,'')==='itemno')score++;
            if(c.includes('description'))score++;if(c==='재고')score++;
            if(c.replace(/ /g,'')==='safetyqty')score++;
        });
        if(score>=2){hi=i;break;}
    }
    const headers=matrix[hi].map(h=>h?String(h).trim():'');
    const dataRows=matrix.slice(hi+1);
    const iiNo=headers.findIndex(h=>{if(!h)return false;const c=h.toLowerCase().replace(/ /g,'').replace(/\.$/,'');return c=='itemno';});
    let iStk=headers.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase();return (t==='재고'||t==='현재 재고'||t==='현재재고'||tl==='stock'||tl==='qty')&&!tl.includes('safety');});
    let iSfy=headers.findIndex(h=>{if(!h)return false;const t=String(h).trim();const tl=t.toLowerCase().replace(/ /g,'');return tl==='safety'||tl==='safetyqty'||tl==='safetystock'||t==='안전 재고'||t==='안전재고'||t.includes('안전');});
    if(iStk>=0&&iSfy<0) iSfy=iStk+1;
    if(iStk<0) iStk=6;
    if(iSfy<0) iSfy=iStk+1;

    const hideIdx=headers.reduce((a,h,i)=>{const c=(h||'').toLowerCase().replace(/ /g,'');if(c==='vendor'||c==='벤더'||c.includes('사진')||c==='k')a.push(i);return a;},[]);
    const visMap=[];
    headers.forEach((h,i)=>{if(!hideIdx.includes(i))visMap.push(i);});

    let html=`<table class="part-table"><thead><tr>`;
    visMap.forEach((origIdx,visIdx)=>{
        const h=headers[origIdx];
        const left=['part','model','description','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
        html+=`<th style="text-align:${left?'left;padding-left:20px':'center'}" onclick="executeTableSort(${visIdx})">${escapeHtml(h)}</th>`;
    });
    html+=`</tr></thead><tbody>`;
    let count=0;
    dataRows.forEach(row=>{
        if(!row?.length||!row.join(''))return;
        if(row.join('').includes('Part List'))return;
        const cv=row.map((v,i)=>hideIdx.includes(i)?'':(v!==undefined?String(v).trim():''));
        if(!cv.some(v=>v!==''&&v!=='0'&&v!=='None'))return;
        count++;
        const itemNo=iiNo>=0?String(row[iiNo]||'').trim():null;
        const stk = (itemNo && itemNo!=='' && globalStockCache[itemNo] !== undefined)
                ? globalStockCache[itemNo]
                : (row[iStk] !== undefined ? row[iStk] : 0);
        const sfyRaw2=row[iSfy];
        let sq=parseFloat(String(sfyRaw2||'').replace(/,/g,''));if(isNaN(sq))sq=0;
        let cls='';
        if(stk==='None')cls='none-row';
        else{const ns=parseFloat(String(stk).replace(/,/g,''));if(!isNaN(ns)&&sq>0&&ns<sq)cls='danger-row';}
        const rawAttrs=visMap.map((origIdx,visIdx)=>{const raw=origIdx===iStk?stk:(row[origIdx]!==undefined?row[origIdx]:'');return `data-raw-${visIdx}="${escapeHtml(String(raw))}"`;}).join(' ');
        html+=`<tr class="${cls}" ${rawAttrs}>`;
        visMap.forEach(origIdx=>{
            const h=headers[origIdx];
            const left=['part','model','description','type'].some(k=>h.toLowerCase().replace(/ /g,'').includes(k));
            const v=origIdx===iStk?stk:(row[origIdx]!==undefined?row[origIdx]:'');
            html+=`<td style="text-align:${left?'left;padding-left:20px':'center'}">${escapeHtml(String(v))}</td>`;
        });
        html+=`</tr>`;
    });
    zone.innerHTML=count?html+`</tbody></table>`:`<p style="text-align:center;color:#888;padding:30px;">부품 내역 없음</p>`;
    document.getElementById('view-parts').style.display='flex';
}

/* ══ 정렬/필터 ══ */
function _sortTable(sel,colIdx,key){
    const tbl=document.querySelector(sel);if(!tbl)return;
    const tbody=tbl.querySelector('tbody');
    const dir=currentSortDirection[key]==='desc'?'asc':'desc'; currentSortDirection[key]=dir;
    const rows=Array.from(tbody.querySelectorAll('tr')).filter(r=>r.querySelector('td'));
    rows.sort((a,b)=>{
        const ra=a.getAttribute(`data-raw-${colIdx}`)??a.cells[colIdx]?.innerText.trim()??'';
        const rb=b.getAttribute(`data-raw-${colIdx}`)??b.cells[colIdx]?.innerText.trim()??'';
        const na=parseFloat(String(ra).replace(/,/g,'')),nb=parseFloat(String(rb).replace(/,/g,''));
        if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;
        return dir==='asc'?String(ra).localeCompare(String(rb),'ko'):String(rb).localeCompare(String(ra),'ko');
    });
    rows.forEach(r=>tbody.appendChild(r));
    tbl.querySelectorAll('th').forEach((th,i)=>{th.innerText=th.innerText.replace(/ [↑↓]$/g,'');if(i===colIdx)th.innerText+=dir==='asc'?' ↑':' ↓';});
}
function executeTableSort(ci){_sortTable('.part-table',ci,ci);}
function executeSummarySort(ci){_sortTable('.summary-table',ci,'s_'+ci);}
function filterPartsTable(){
    const q=document.getElementById('parts-search').value.toLowerCase().trim();
    document.querySelectorAll('#parts-data-zone tbody tr').forEach(r=>{r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';});
}
function filterSummaryTable(){
    const q=document.getElementById('summary-search').value.toLowerCase().trim();
    document.querySelectorAll('#summary-data-zone tbody tr').forEach(r=>{r.style.display=r.innerText.toLowerCase().includes(q)?'':'none';});
}
function filterModalTable(){ filterPartsTable(); }
function closePartsModal(e){
    document.getElementById('view-parts').classList.remove('active-modal');
    history.back();
}
function goBackFromParts(){ closePartsModal(null); }
</script>
